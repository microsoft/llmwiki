name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build VS Code extension
        run: npm run build --workspace=packages/vscode

      - name: Lint shared
        run: npm run lint --workspace=packages/shared

      - name: Lint VS Code extension
        run: npm run lint --workspace=packages/vscode

      - name: Test with coverage
        run: npm run coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`\${m.pct}% (\${m.covered}/\${m.total})\`;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log(\`| Lines | \${fmt(c.lines)} |\`);
              console.log(\`| Functions | \${fmt(c.functions)} |\`);
              console.log(\`| Branches | \${fmt(c.branches)} |\`);
              console.log(\`| Statements | \${fmt(c.statements)} |\`);
            " >> $GITHUB_STEP_SUMMARY
          fi
