name: Wiki Lint

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  lint-wiki:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run wiki lint
        id: lint
        continue-on-error: true
        run: |
          set +e
          LINT_OUTPUT=$(npx plaid wiki lint --json --path wiki 2>&1)
          LINT_EXIT=$?
          echo "exit_code=$LINT_EXIT" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "output<<$EOF" >> $GITHUB_OUTPUT
          echo "$LINT_OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Auto-fix lint issues
        if: steps.lint.outputs.exit_code != '0'
        run: npx plaid wiki lint --fix --path wiki

      - name: Commit auto-fixes
        id: commit
        if: steps.lint.outputs.exit_code != '0'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix(wiki): auto-fix lint issues [skip ci]"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "committed=false" >> $GITHUB_OUTPUT
          fi

      - name: Re-lint after fix
        id: relint
        if: steps.lint.outputs.exit_code != '0'
        continue-on-error: true
        run: |
          set +e
          LINT_OUTPUT=$(npx plaid wiki lint --json --path wiki 2>&1)
          LINT_EXIT=$?
          echo "exit_code=$LINT_EXIT" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "output<<$EOF" >> $GITHUB_OUTPUT
          echo "$LINT_OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Manage wiki-lint issue
        uses: actions/github-script@v7
        env:
          LINT_EXIT: ${{ steps.lint.outputs.exit_code }}
          RELINT_EXIT: ${{ steps.relint.outputs.exit_code }}
          LINT_OUTPUT: ${{ steps.lint.outputs.output }}
          RELINT_OUTPUT: ${{ steps.relint.outputs.output }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
        with:
          script: |
            const lintExit = parseInt(process.env.LINT_EXIT || '0', 10);
            const relintExit = parseInt(process.env.RELINT_EXIT || '0', 10);
            const lintOutput = process.env.LINT_OUTPUT || '';
            const relintOutput = process.env.RELINT_OUTPUT || '';
            const committed = process.env.COMMITTED === 'true';

            const label = 'wiki-lint';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'd73a4a',
                description: 'Automated wiki lint findings',
              });
            }

            // Find existing open wiki-lint issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });
            const existingIssue = issues[0];

            // Determine if there are remaining errors
            const hasRemainingErrors = lintExit !== 0 && relintExit !== 0;

            if (hasRemainingErrors) {
              const output = relintOutput || lintOutput;
              const fixNote = committed
                ? '✅ Some issues were auto-fixed and committed.\n\n'
                : '';
              const body = [
                '## 🔍 Wiki Lint Report',
                '',
                `_Generated by scheduled lint workflow on ${new Date().toISOString()}_`,
                '',
                fixNote,
                '### Remaining Issues',
                '',
                '```json',
                output.substring(0, 60000),
                '```',
                '',
                'These issues require manual attention.',
              ].join('\n');

              if (existingIssue) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body,
                });
                core.info(`Updated issue #${existingIssue.number}`);
              } else {
                const { data: newIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Wiki lint: issues require manual attention',
                  body,
                  labels: [label],
                });
                core.info(`Created issue #${newIssue.number}`);
              }
            } else if (existingIssue) {
              // All clear - close existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: '✅ All wiki lint issues have been resolved. Closing this issue.',
              });
              core.info(`Closed issue #${existingIssue.number}`);
            } else {
              core.info('No lint issues found and no open issue to close.');
            }
