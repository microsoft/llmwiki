patterns_found:
  - category: architecture
    pattern: "Shared library as single source of truth"
    description: "All business logic lives in @llmwiki/shared. CLI and VS Code are thin wrappers that handle UI/formatting only. Clean separation enables direct MCP wrapping."
    examples:
      - file: ingest.ts (CLI)
        location: "packages/cli/src/commands/ingest.ts:4"
        snippet: "import { ingestSource, bulkIngest } from '@llmwiki/shared';"
      - file: commands.ts (VS Code)
        location: "packages/vscode/src/commands.ts:4-14"
        snippet: "import { readIndex, directoryExists, lintWiki, appendEntry, ingestSource, bulkIngest, queryWiki, getWikiStatus } from '@llmwiki/shared';"
    prevalence: common

  - category: architecture
    pattern: "Structured JSON result objects"
    description: "Every operation returns a typed result with command name, api_version, status, and operation-specific fields. Consistent pattern across all 6 commands."
    examples:
      - file: ingest.ts (shared)
        location: "packages/shared/src/ingest.ts:12-21"
        snippet: "export interface IngestResult { command: string; api_version: string; status: 'success' | 'error' | 'skipped'; pages_created: string[]; pages_updated: string[]; dry_run: boolean; }"
      - file: status.ts (shared)
        location: "packages/shared/src/status.ts:11-20"
        snippet: "export interface StatusResult { command: string; api_version: string; source_count: number; wiki_page_count: number; ... }"
    prevalence: common

  - category: architecture
    pattern: "Mechanical ingest — no intelligence"
    description: "Ingest reads source file, creates a slug, writes a summary page with raw 500-char excerpt, adds generic summary to index. No summarization, tagging, entity extraction, or cross-referencing."
    examples:
      - file: ingest.ts (shared)
        location: "packages/shared/src/ingest.ts:116-118"
        snippet: "const excerpt = sourceContent.length > 500 ? sourceContent.slice(0, 500) + '…' : sourceContent;"
      - file: ingest.ts (shared)
        location: "packages/shared/src/ingest.ts:151"
        snippet: "summary: `Source file (${sourceExt || 'unknown'})`"
    prevalence: common

  - category: error_handling
    pattern: "Bare catch blocks swallowing all errors"
    description: "17+ instances of catch {} that swallow all errors (not just ENOENT). Pattern exists across shared/log.ts, shared/wiki.ts, shared/sources.ts, shared/index-ops.ts, shared/query.ts, shared/status.ts, shared/lint.ts, shared/bulk-ingest.ts, cli/init.ts, cli/ingest.ts."
    examples:
      - file: wiki.ts
        location: "packages/shared/src/wiki.ts:41-43"
        snippet: "} catch { // ENOENT — wiki directory doesn't exist; return empty page list; return []; }"
      - file: log.ts
        location: "packages/shared/src/log.ts:24-27"
        snippet: "} catch { // File does not exist yet — will be created }"
    prevalence: common

  - category: structure
    pattern: "VS Code init still duplicates CLI init"
    description: "llmwiki.init in VS Code commands.ts reimplements directory creation, index writing, log writing, and AGENTS.md creation instead of calling shared initWiki(). AGENTS.md content differs between CLI and VS Code versions."
    examples:
      - file: commands.ts (VS Code)
        location: "packages/vscode/src/commands.ts:51-87"
        snippet: "const dirs = ['raw', 'wiki', 'wiki/entities', 'wiki/concepts', 'wiki/sources']; ... await writeFile(join(root, 'AGENTS.md'), '# AGENTS.md\\n\\n## Wiki Schema\\n\\n_See CLI docs for full schema._\\n');"
    prevalence: rare

  - category: testing
    pattern: "E2E tests fail on api_version"
    description: "11 E2E tests fail because api_version is undefined in JSON output. Tests run against built dist/cli.js which may be stale. The shared functions return api_version but the built binary may not reflect latest code."
    examples:
      - file: cli.test.ts (E2E)
        location: "tests/cli/e2e/cli.test.ts:671"
        snippet: "expect(init.api_version).toBe('1'); // Received: undefined"
    prevalence: rare

