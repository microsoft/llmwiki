# ────────────────────────────────────────────────────────────────
# GAP ANALYSIS: Strategy Vision vs Current Reality
# ────────────────────────────────────────────────────────────────
gap_analysis:
  vision_vs_reality:
    - area: "LLM-powered summarization"
      vision: "LLM reads source, extracts key information, writes content-aware summary"
      reality: "500-character raw text excerpt, no intelligence"
      gap_severity: critical
      strategy_reference: "idea.md:11, STRATEGY.md:7"

    - area: "Cross-referencing"
      vision: "Automatic cross-references built on every ingest. Single source touches 10-15 pages."
      reality: "No automatic cross-referencing. Ingest creates exactly 1 page. Backlinks module exists but only reads existing links."
      gap_severity: critical
      strategy_reference: "idea.md:11, STRATEGY.md:12"

    - area: "Entity/concept extraction"
      vision: "LLM identifies entities and concepts in sources, creates/updates typed pages"
      reality: "Only source-summary pages created. No entity or concept page creation."
      gap_severity: high
      strategy_reference: "idea.md:11"

    - area: "Contradiction detection"
      vision: "Flag conflicting information across sources"
      reality: "Not implemented. Lint checks structural health only."
      gap_severity: medium
      strategy_reference: "idea.md:41"

    - area: "Agent interop (MCP)"
      vision: "External LLM agents talk to wiki via CLI or MCP. Wiki becomes shared knowledge layer."
      reality: "CLI --json works for scripting. No MCP server. No tools for LLM agents to call."
      gap_severity: high
      strategy_reference: "STRATEGY.md:13-14, STRATEGY.md:31"

    - area: "Intelligent query"
      vision: "LLM synthesizes answers from wiki pages, files good answers back as new pages"
      reality: "Keyword substring matching only. --save exists but creates raw result dump, not LLM synthesis."
      gap_severity: medium
      strategy_reference: "idea.md:39"

    - area: "Obsidian compatibility"
      vision: "Wiki browsable from Obsidian with graph view"
      reality: "Pages are standard markdown with links — likely works but untested/undocumented"
      gap_severity: low
      strategy_reference: "STRATEGY.md:7"

    - area: "Web browsability"
      vision: "Browsable from the web (GitHub)"
      reality: "Standard markdown in GitHub repo — already browsable. No GitHub Pages."
      gap_severity: low
      strategy_reference: "STRATEGY.md:7"

  remaining_tech_debt:
    - id: "C-1"
      description: "Log appendEntry has read-then-write race condition. Should use fs.appendFile."
      location: "packages/shared/src/log.ts:16-31"
      severity: concern
      source: "cycle-2-review.md"

    - id: "C-3"
      description: "Dead getPageLinks() call + duplicated regex in backlinks.ts"
      location: "packages/shared/src/backlinks.ts:35-41"
      severity: concern
      source: "cycle-2-review.md"

    - id: "C-4"
      description: "Bare catch {} blocks swallow all errors (17+ instances). Should check ENOENT specifically."
      location: "Multiple files across packages/shared/src/"
      severity: concern
      source: "cycle-2-review.md"

    - id: "C-5"
      description: "String-prefix path traversal guard may fail on case-insensitive filesystems (Windows)"
      location: "packages/shared/src/ingest.ts:54-67"
      severity: concern
      source: "cycle-2-review.md"

    - id: "C-6"
      description: "VS Code integration tests exist but are not wired to CI"
      location: ".github/workflows/ci.yml, tests/vscode/integration/"
      severity: concern
      source: "cycle-2-review.md"

    - id: "C-7"
      description: "'as unknown as string[]' type assertion in sources.ts"
      location: "packages/shared/src/sources.ts:24"
      severity: concern
      source: "cycle-2-review.md"

    - id: "INIT-DUP"
      description: "VS Code init command still duplicates logic from CLI init instead of calling shared initWiki()"
      location: "packages/vscode/src/commands.ts:51-87"
      severity: concern
      source: "current analysis"

    - id: "E2E-FAIL"
      description: "11 E2E tests fail on api_version being undefined. Likely stale build or init command not returning api_version."
      location: "tests/cli/e2e/cli.test.ts:671, 788, 802"
      severity: concern
      source: "current test run"

    - id: "N-1"
      description: "llmwiki.isWikiWorkspace context set unconditionally to true"
      location: "packages/vscode/src/extension.ts:15"
      severity: nit
      source: "cycle-2-review.md"

    - id: "N-6"
      description: "passWithNoTests: true in vitest config could hide missing tests"
      location: "vitest.config.ts:7"
      severity: nit
      source: "cycle-2-review.md"

# ────────────────────────────────────────────────────────────────
# CYCLE-4 RECOMMENDATIONS (ranked by impact)
# ────────────────────────────────────────────────────────────────
cycle4_recommendations:
  theme: "MCP Server + Smart Write Operations — Make the wiki intelligent"
  rationale: |
    The entire product thesis is "LLM does all the maintenance." After 3 cycles of tool infrastructure,
    the tooling is solid but the LLM isn't involved. The cleanest path to LLM-powered operations is
    MCP server mode — it exposes wiki operations as tools that any LLM agent can call, without embedding
    an LLM client in the CLI. This aligns with the strategy ("start with CLI --json, add MCP later")
    and the "no infrastructure" principle.

  approach_analysis:
    - approach: "A — MCP Server Mode (recommended)"
      description: |
        Add 'plaid wiki mcp' command that starts an MCP server over stdio transport.
        Expose existing shared library functions as MCP tools.
        Add new write operations (update-page, create-entity, create-concept, add-crosslinks) that
        the LLM needs to perform intelligent ingest and cross-referencing.
        The LLM agent (Claude, ChatGPT, etc.) connects and orchestrates smart operations.
      pros:
        - "Clean architecture: CLI stays a tool, LLM stays external"
        - "Provider-agnostic: works with any MCP-compatible LLM"
        - "Shared library is already perfectly factored for wrapping as tools"
        - "Aligns with strategy: 'add MCP server mode later'"
        - "No API key management, no cost embedding in CLI"
      cons:
        - "Requires MCP-capable LLM client (Claude Desktop, Cursor, etc.)"
        - "Smart ingest workflow lives in the LLM's context, not codified"
        - "MCP SDK adds a dependency"

    - approach: "B — Embedded LLM Client"
      description: |
        Add LLM provider configuration (API key, model selection) to CLI.
        'plaid wiki ingest --llm' calls LLM API during ingest for summarization, entity extraction, cross-referencing.
      pros:
        - "Fully automated: ingest is smart without external agent"
        - "GitHub Actions ingest.yml could use it automatically"
      cons:
        - "Requires API key management (secrets, config files)"
        - "Locks into specific LLM providers or needs abstraction layer"
        - "Adds cost per ingest operation"
        - "More complex: prompt engineering, error handling for API calls, rate limits"
        - "Violates 'no custom middleware' principle somewhat"

  recommended_focus_areas:
    - rank: 1
      area: "MCP Server Foundation"
      impact: critical
      effort: medium
      description: |
        Add 'plaid wiki mcp' command that starts an MCP server over stdio transport using @modelcontextprotocol/sdk.
        Expose read-only tools first: wiki-status, wiki-query, wiki-lint, wiki-list-pages, wiki-list-sources,
        wiki-read-page, wiki-read-index. These let an LLM agent understand the wiki state.
      technical_approach: |
        - Add @modelcontextprotocol/sdk to packages/cli dependencies
        - Create packages/cli/src/commands/mcp.ts with registerMcpCommand()
        - Create packages/shared/src/mcp-tools.ts defining tool schemas (name, description, inputSchema)
        - Each tool wraps an existing shared function:
            wiki_status → getWikiStatus()
            wiki_query → queryWiki()
            wiki_lint → lintWiki()
            wiki_list_pages → listPages() + readPage() for frontmatter
            wiki_list_sources → listSources()
            wiki_read_page → readPage()
            wiki_read_index → readIndex()
        - stdio transport: process.stdin/stdout for MCP protocol, console.error for logs
        - Integration test: spawn CLI subprocess, send MCP messages, verify responses

    - rank: 2
      area: "Smart Write Operations via MCP"
      impact: critical
      effort: medium
      description: |
        Add write tools that the LLM needs to perform intelligent wiki maintenance:
        wiki-write-page, wiki-update-page, wiki-create-entity, wiki-create-concept,
        wiki-add-crosslinks, wiki-update-index.
        These are the tools that bridge the gap between "mechanical file copy" and "LLM-powered maintenance."
      technical_approach: |
        New shared functions needed:
        - updatePage(wikiDir, pagePath, updates: Partial<WikiPage>) — merge updates into existing page
        - createEntityPage(wikiDir, name, content, tags) — create entity page with proper frontmatter + add to index
        - createConceptPage(wikiDir, name, content, tags) — same for concepts
        - addCrosslinks(wikiDir, fromPage, toPages[]) — add markdown links between pages
        - updateIndexEntry(indexPath, path, updates) — update summary/tags of existing entry
        Each becomes an MCP tool with proper input validation.

    - rank: 3
      area: "Ingest Enhancement (MCP-aware)"
      impact: high
      effort: low
      description: |
        Enhance ingestSource to return more structured data that helps LLM agents:
        - Full source content (not just 500-char excerpt) available via read-page tool
        - Source metadata (word count, detected language, key terms) in the result
        - A suggested_actions field hinting what the LLM should do next (create entity pages, update concepts, etc.)
      technical_approach: |
        - Expand IngestResult to include source_word_count, source_content_type
        - Add a wiki-ingest-with-context tool that ingests AND returns relevant existing pages
          (pages that might need updating based on keyword overlap with the new source)
        - This gives the LLM agent enough context to make intelligent decisions

    - rank: 4
      area: "Tech Debt Cleanup"
      impact: medium
      effort: low
      description: |
        Fix remaining issues from cycle-2 review and current test failures.
        Can run in parallel with MCP work as independent tasks.
      items:
        - "Fix 11 failing E2E tests (rebuild dist/ or fix api_version propagation in init command)"
        - "Fix appendEntry race condition: switch to fs.appendFile (C-1)"
        - "Fix dead getPageLinks call + duplicated regex in backlinks.ts (C-3)"
        - "Extract initWiki into @llmwiki/shared so VS Code init stops duplicating (INIT-DUP)"
        - "Remove passWithNoTests from vitest config (N-6)"

    - rank: 5
      area: "Improved Error Handling"
      impact: low
      effort: medium
      description: |
        Fix bare catch {} blocks to check for ENOENT specifically (C-4).
        17+ instances across the codebase. Systematic but straightforward.
      technical_approach: |
        - Create a shared helper: isNotFoundError(err) that checks code === 'ENOENT'
        - Replace catch {} with catch (err) { if (isNotFoundError(err)) { ... } else { throw err; } }
        - Apply across all 17+ instances

open_questions:
  - question: "Which MCP transport should be used: stdio or SSE?"
    context: "stdio is simpler and works for local-only use. SSE enables remote connections (e.g., from a hosted LLM service). The strategy says 'no self-hosted servers' which favors stdio."
    type: decision_blocker
    affects: ["mcp-server-foundation"]

  - question: "Should the MCP server expose wiki-write-page with unrestricted write access, or should writes be constrained?"
    context: "Unrestricted write is most flexible for LLM agents but could lead to corrupted wiki state. Constrained writes (e.g., must include valid frontmatter, must update index) are safer but limit LLM creativity."
    type: decision_blocker
    affects: ["smart-write-operations"]

  - question: "How should MCP tools be tested? Mock transport or real subprocess?"
    context: "The MCP SDK supports in-memory transport for testing. Alternatively, spawn the CLI as a subprocess and send MCP messages over stdin/stdout. The E2E approach is more realistic but slower."
    type: research
    affects: ["mcp-server-foundation"]

  - question: "Should the GitHub Actions ingest.yml be updated to use MCP for LLM-powered ingest?"
    context: "This would require an LLM API key as a GitHub secret and would incur cost per ingest. It would make the auto-ingest intelligent but adds complexity."
    type: nice_to_know
    affects: ["ingest-enhancement"]

  - question: "What is the root cause of the 11 failing E2E tests?"
    context: "api_version is undefined in JSON output. Could be: (1) stale dist/ build, (2) init command not including api_version in its result type, (3) JSON output not including api_version for some commands. Needs investigation."
    type: research
    affects: ["tech-debt-cleanup"]

gaps:
  - area: "MCP SDK evaluation"
    description: "Need to verify @modelcontextprotocol/sdk TypeScript SDK stability, API surface, and stdio transport support before committing to it."
    impact: research_blocker
    affects: ["mcp-server-foundation"]

  - area: "Smart ingest workflow design"
    description: "The exact sequence of MCP tool calls an LLM should make during 'smart ingest' is not defined. Need to design the workflow: read source → analyze → create pages → add crosslinks → update index."
    impact: nice_to_know
    affects: ["smart-write-operations", "ingest-enhancement"]

  - area: "E2E test root cause"
    description: "11 tests fail on api_version. Need to determine if this is a build issue, a code issue in init command, or a test expectation issue."
    impact: research_blocker
    affects: ["tech-debt-cleanup"]
