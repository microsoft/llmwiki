plan_id: cycle-4
objective: "Identify the highest-impact next improvements for the LLM Wiki after 3 cycles of CLI, VS Code extension, and infrastructure hardening"
focus_area: "cycle-4 planning — LLM-powered operations, MCP server, smart ingest, remaining tech debt"
created_at: "2026-04-10"
created_by: gem-researcher
status: completed

tldr: |
  - THE BIGGEST GAP: The LLM does NONE of the maintenance the strategy promises. Ingest is mechanical — 500-char excerpt, no summarization, no cross-referencing, no entity extraction, no contradiction detection. The entire product thesis ("LLM does all the maintenance") is unrealized.
  - RECOMMENDED CYCLE-4 THEME: "MCP Server + Smart Write Operations" — expose wiki as MCP tools so external LLM agents can orchestrate intelligent ingest, cross-referencing, and page updates. This is the cleanest path to LLM-powered operations without embedding LLM clients in the CLI.
  - Infrastructure is ready: @llmwiki/shared has 14 modules with clean interfaces, CLI commands are thin wrappers, architecture supports wrapping as MCP tools directly.
  - 11 E2E tests currently fail (api_version undefined — likely stale build artifact issue). VS Code init command still duplicates logic. Log appendEntry race condition (C-1) and bare catch blocks (C-4) still present from cycle-2 review.
  - MCP SDK (@modelcontextprotocol/sdk) is the TypeScript SDK for MCP servers. stdio transport is simplest and matches the "no infrastructure" strategy.

research_metadata:
  methodology: "Full codebase read: all 14 shared modules, 6 CLI commands, 7 VS Code files, 23 test files, 2 CI workflows, STRATEGY.md, ARCHITECTURE.md, idea.md, cycle-2 review, cycle-3 research/plan, activity-log.md, state.json. Test coverage run (367 tests: 356 pass, 11 fail). Pattern analysis across all source files."
  scope: "Entire codebase + strategy documents + previous cycle artifacts. 3 research passes: (1) structure discovery, (2) implementation detail analysis, (3) gap analysis and synthesis."
  confidence: high
  coverage: 98
  decision_blockers: 2
  research_blockers: 0

