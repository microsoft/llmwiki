# =============================================================================
# SECTION 12: OPEN QUESTIONS & GAPS
# =============================================================================

open_questions:
  - question: "Should the monorepo migration happen before or after the extension MVP?"
    context: |
      The extension can be built as a separate package that imports from the CLI's
      dist/ output using child_process. Monorepo migration enables cleaner code sharing
      but adds upfront migration work. The e2e tests already prove the child_process
      pattern works.
    type: decision_blocker
    affects: ["monorepo-migration", "vscode-extension-scaffold"]

  - question: "Should the extension use VS Code's built-in markdown preview or a custom webview?"
    context: |
      Built-in preview handles standard markdown well but won't render custom
      frontmatter nicely or support wiki-specific navigation. Foam and Memo both
      use built-in preview as default. Custom webview adds complexity but enables
      richer rendering.
    type: decision_blocker
    affects: ["webview-design", "vscode-extension-mvp"]

  - question: "What is the publisher name for VS Code Marketplace?"
    context: "Publishing requires an Azure DevOps account and registered publisher ID. This needs to be created before first publish."
    type: nice_to_know
    affects: ["extension-publishing"]

  - question: "Should backlinks be computed on-demand or cached in memory?"
    context: |
      On-demand: scan all pages every time user opens a file (~100ms for 100 pages).
      Cached: build a link graph on activation, update incrementally on file changes.
      At ~100 pages on-demand is fine; at ~1000+ pages caching becomes necessary.
    type: research
    affects: ["backlinks-feature", "performance"]

gaps:
  - area: "Backlinks API"
    description: "No function to query 'what pages link to X'. getPageLinks() extracts outbound links only."
    impact: research_blocker
    affects: ["backlinks-tree-view", "cross-reference-panel"]

  - area: "Source listing API"
    description: "No function to list files in raw/ with metadata. getWikiStatus() only counts them."
    impact: research_blocker
    affects: ["raw-sources-tree-view"]

  - area: "LLM integration design"
    description: "No LLM is invoked in the current codebase. Strategy describes LLM as central but implementation is plain text processing."
    impact: nice_to_know
    affects: ["llm-ingest", "llm-query-synthesis"]

  - area: "Extension test infrastructure"
    description: "@vscode/test-electron not yet configured. Need test runner setup for extension integration tests."
    impact: nice_to_know
    affects: ["extension-testing"]

  - area: "1 failing e2e test"
    description: "tests/e2e/cli.test.ts:534 — query e2e test expects exit code 0 but gets 1. Likely a query command issue or test environment issue."
    impact: nice_to_know
    affects: ["cli-stability"]
