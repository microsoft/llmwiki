related_architecture:
  components_relevant_to_domain:
    - component: "lib/wiki.ts"
      responsibility: "Read/write/list wiki pages, extract links"
      location: "src/lib/wiki.ts"
      relationship_to_domain: "Extension directly consumes these for tree views and navigation"

    - component: "lib/index.ts"
      responsibility: "Parse and manage the wiki index file"
      location: "src/lib/index.ts"
      relationship_to_domain: "Extension uses readIndex() as primary data source for WikiPagesTreeDataProvider"

    - component: "lib/log.ts"
      responsibility: "Parse and manage the activity log"
      location: "src/lib/log.ts"
      relationship_to_domain: "Extension uses readLog() for status bar and activity views"

    - component: "commands/status.ts"
      responsibility: "Aggregate wiki statistics"
      location: "src/commands/status.ts"
      relationship_to_domain: "Extension uses getWikiStatus() for status bar item"

    - component: "commands/lint.ts"
      responsibility: "Run wiki health checks"
      location: "src/commands/lint.ts"
      relationship_to_domain: "Extension uses lintWiki() for LintFindingsTreeDataProvider and diagnostics"

  data_flow_involving_domain: |
    Extension reads wiki/index.md via readIndex() → builds tree view nodes
    Extension reads wiki/log.md via readLog() → shows recent activity
    Extension calls getWikiStatus() → updates status bar
    Extension calls lintWiki() → populates lint tree and VS Code diagnostics
    Extension calls ingestSource() → processes files dropped into raw/
    Extension calls queryWiki() → shows search results in quick pick or panel
    All data flows are async, returning typed results, no streaming needed.

  key_relationships_to_domain:
    - from: "vscode extension"
      to: "lib/wiki.ts"
