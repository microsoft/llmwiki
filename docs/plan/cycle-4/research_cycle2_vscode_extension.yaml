plan_id: cycle-2
objective: "Research architecture and patterns for VS Code extension wrapping the llmwiki CLI, plus CLI improvements needed to support it"
focus_area: vscode_extension_and_cli_evolution
created_at: "2025-07-17"
created_by: gem-researcher
status: completed

tldr: |
  - The CLI already exports clean async functions (initWiki, ingestSource, queryWiki, lintWiki, getWikiStatus) with typed result interfaces — the extension should import these directly as a library rather than shelling out to child_process.
  - Best monorepo structure: npm workspaces with packages/cli, packages/vscode, packages/shared (shared types + lib/) — minimal migration since src/lib/ already contains pure, reusable functions with no commander dependency.
  - Competitor analysis (Foam, Dendron, Memo) shows the winning pattern is TreeDataProvider for wiki browsing + backlinks panel + command palette integration — no need for heavyweight webview except for rendered page preview.
  - Key CLI gaps for extension support: no file watcher / change events, no "list all pages with metadata" command, no backlinks/cross-reference query API, and the query command uses naive substring search (no TF-IDF or fuzzy match).
  - Extension activation should use workspaceContains:wiki/index.md to avoid loading in non-wiki workspaces; esbuild for bundling with vscode as external.

research_metadata:
  methodology: "Hybrid retrieval: full source code read of all 8 src/ files + 11 test files, web search for VS Code extension API patterns, competitor architectures (Foam/Dendron/Memo), monorepo strategies, and publishing workflows"
  scope: "Complete read of all production source code (8 files, ~750 lines), all test structure (11 test files), both CI workflows, package.json, tsconfig.json, tsup.config.ts. External research on VS Code APIs, competitor extensions, monorepo patterns."
  confidence: high
  coverage: 100
  decision_blockers: 2
  research_blockers: 0

# =============================================================================
# SECTION 1: VS CODE EXTENSION ARCHITECTURE
# =============================================================================

vscode_extension_architecture:
  cli_invocation_strategy:
    recommendation_basis: "Analysis of existing codebase structure"
    options:
      - option: "embedded_library"
        description: "Import CLI functions directly as a TypeScript library"
        evidence: |
          The CLI already separates logic from commander registration cleanly:
          - initWiki(targetPath) → Promise<InitResult>
          - ingestSource(sourcePath, targetPath, dryRun) → Promise<IngestResult>
          - queryWiki(queryStr, targetPath, save) → Promise<QueryOutput>
          - lintWiki(targetPath, categories?) → Promise<LintResult>
          - getWikiStatus(targetPath) → Promise<StatusResult>
          All functions accept plain string paths and return typed interfaces.
          None depend on commander, process.argv, or console.log.
          The lib/ layer (wiki.ts, index.ts, log.ts) is fully decoupled.
        pros:
          - "Zero serialization overhead — direct function calls with typed returns"
          - "Shared types between extension and CLI at compile time"
          - "No PATH resolution, no binary installation requirement"
          - "Better error handling — catch exceptions directly vs parsing stderr"
        cons:
          - "Tight coupling between extension and CLI versions"
          - "Must restructure as monorepo to share code"

      - option: "child_process"
        description: "Shell out to the CLI binary using child_process.execFile"
        evidence: |
          The --json flag already produces structured JSON for all commands.
          The e2e tests (tests/e2e/cli.test.ts) demonstrate this exact pattern —
          they use execFile(NODE, [CLI_PATH, 'wiki', ...args]) and parse JSON output.
        pros:
          - "Full decoupling — extension and CLI can version independently"
          - "Works even if CLI is installed globally or via npx"
          - "Already proven pattern in the e2e test suite"
        cons:
          - "Process spawn overhead on every operation"
          - "Must parse JSON strings and handle serialization errors"
          - "Error messages lose type information"

      chosen_pattern: "embedded_library (primary) with child_process fallback"
      rationale: |
        The codebase is perfectly structured for embedded use. All business logic
        functions are exported independently of the commander registration functions.
        The lib/ layer (wiki.ts, index.ts, log.ts) has zero CLI dependencies.
        Use embedded imports for monorepo builds; support child_process as fallback
        for users who install the CLI separately.

  tree_view_design:
    api: "vscode.TreeDataProvider<T>"
    providers_needed:
      - provider: "WikiPagesTreeDataProvider"
        data_source: "readIndex(wiki/index.md) → IndexEntry[]"
        structure: "Category (H2 headings) → Individual pages"
        fields_per_node: "title, path, summary, tags, category"
        refresh_trigger: "FileSystemWatcher on wiki/**/*.md"
        existing_support: |
          IndexEntry already has: path, title, summary, category, tags.
          readIndex() parses the categorized markdown index.
          findEntries() supports title and tag filtering.

      - provider: "RawSourcesTreeDataProvider"
        data_source: "readdir(raw/) recursive"
        structure: "Flat list or subdirectory grouping"
        refresh_trigger: "FileSystemWatcher on raw/**"
        existing_support: "getWikiStatus() counts raw files but doesn't list them."
        gap: "Need a listSources() function that returns file metadata"

      - provider: "LintFindingsTreeDataProvider"
        data_source: "lintWiki() → LintResult.findings[]"
        structure: "Severity (error/warning/info) → Individual findings"
        fields_per_node: "severity, category, message, file"
        refresh_trigger: "Manual (on command) or on wiki file save"
        existing_support: "LintFinding has severity, category, message, file — ready to use"

      - provider: "BacklinksTreeDataProvider"
        data_source: "Needs new API — scan all pages for links to active file"
        structure: "Flat list of pages linking to the current editor file"
        gap: "getPageLinks() extracts outbound links; need getBacklinks(targetPage) for inbound"

    competitor_patterns:
      foam:
        tree_views: "NotesTreeDataProvider, TagsTreeDataProvider, OrphansTreeDataProvider, PlaceholdersTreeDataProvider"
        refresh: "FileSystemWatcher + workspace events"
        architecture: "FoamWorkspace model with FoamGraph for relationship tracking"
        lesson: "Multiple focused tree views > one monolithic tree"

      dendron:
        tree_views: "Custom hierarchical tree using dot-notation (project.topic.detail)"
        architecture: "Client-server model — VS Code extension as client, express.js backend server"
        refresh: "Server-mediated updates"
        lesson: "Client-server is overengineered for our scale; direct function calls are better"

      memo:
        tree_views: "Standard VS Code file explorer + backlinks panel"
        architecture: "Lightweight, file-based, no custom tree hierarchy"
        refresh: "VS Code built-in file watcher"
        lesson: "Minimalist approach works well for small-to-medium wikis — matches our scope"

  webview_design:
    purpose: "Rendered markdown preview for wiki pages"
    approach: "Use VS Code built-in markdown preview (vscode.commands.executeCommand('markdown.showPreview'))"
    custom_webview_needed: false
    rationale: |
      VS Code's built-in markdown preview already renders .md files with frontmatter.
      Custom webview only needed if we want: interactive cross-reference graphs,
      custom frontmatter rendering, or embedded query results.
      Recommendation: start with built-in preview, add custom webview in cycle-3
      only if user feedback demands it.
    future_webview_candidates:
      - "Wiki graph visualization (like Foam's graph view)"
      - "Query result synthesis view"
      - "Dashboard showing status + recent activity"

  command_palette:
    commands:
      - id: "llmwiki.init"
        title: "LLM Wiki: Initialize Wiki"
        implementation: "initWiki(workspaceFolder)"
        when: "workspaceFolderCount > 0 && !workspaceContains:wiki/index.md"

      - id: "llmwiki.ingest"
        title: "LLM Wiki: Ingest Source"
        implementation: "ingestSource(selectedFile, workspaceFolder, false)"
        when: "workspaceContains:wiki/index.md"
        input: "File picker or right-click context menu on raw/ files"

      - id: "llmwiki.query"
        title: "LLM Wiki: Search Wiki"
        implementation: "queryWiki(inputBoxValue, workspaceFolder)"
        when: "workspaceContains:wiki/index.md"
        input: "InputBox with query string"

      - id: "llmwiki.lint"
        title: "LLM Wiki: Lint Wiki"
        implementation: "lintWiki(workspaceFolder)"
        when: "workspaceContains:wiki/index.md"

      - id: "llmwiki.status"
        title: "LLM Wiki: Show Status"
        implementation: "getWikiStatus(workspaceFolder)"
        when: "workspaceContains:wiki/index.md"

      - id: "llmwiki.openPage"
        title: "LLM Wiki: Open Wiki Page"
        implementation: "Quick pick from readIndex() results → open in editor"
        when: "workspaceContains:wiki/index.md"

  activation_events:
    - "workspaceContains:wiki/index.md"
    - "onCommand:llmwiki.init"
    rationale: |
      Only activate when the workspace contains a wiki (wiki/index.md exists)
      or when the user explicitly runs the init command.
      Never use "*" — it degrades VS Code startup performance.

  status_bar:
    items:
      - text: "$(book) Wiki: {pageCount} pages"
        tooltip: "Source count, last ingest, index coverage"
        command: "llmwiki.status"
        data_source: "getWikiStatus() — cached, refreshed on file changes"
        alignment: "left"

  bundling:
    tool: "esbuild"
    config:
      entry: "./src/extension.ts"
      bundle: true
      platform: "node"
      target: "node20"
      external: ["vscode"]
      format: "cjs"
      sourcemap: true
      minify: true
      outfile: "./out/extension.js"
    rationale: |
      esbuild is the recommended VS Code extension bundler (official docs).
      Already used by the CLI (via tsup which wraps esbuild).
      Must mark 'vscode' as external — it's provided by the runtime.
      CJS format required for VS Code extensions (main field in package.json).

  testing:
    frameworks:
      - name: "@vscode/test-electron"
        purpose: "Integration tests that run inside a real VS Code instance"
        use_for: "Testing tree views, command registration, activation, webview rendering"

      - name: "vitest"
        purpose: "Unit tests for shared library code and extension logic"
        use_for: "Testing data transformation, tree item creation, configuration handling"
        existing_usage: "Already used for CLI — 192+ tests across unit, command, e2e suites"

    recommended_split:
      unit: "Tree data provider logic, status bar formatting, config handling — vitest"
      integration: "Command execution, tree view rendering, activation — @vscode/test-electron"
      e2e: "Full user workflows in VS Code — @vscode/test-electron"

  publishing:
    tool: "@vscode/vsce"
    steps:
      - "Create Azure DevOps account + Personal Access Token (PAT)"
      - "Register publisher via marketplace.visualstudio.com/manage"
      - "vsce login <publisher>"
      - "vsce package → creates .vsix file"
      - "vsce publish → pushes to VS Code Marketplace"
    manifest_fields:
      publisher: "TBD — needs Azure DevOps account"
      engines_vscode: "^1.85.0"
      categories: ["Other"]
      activationEvents: ["workspaceContains:wiki/index.md", "onCommand:llmwiki.init"]
      icon: "Required — 128x128 PNG"

# =============================================================================
# SECTION 2: CLI IMPROVEMENTS NEEDED FOR EXTENSION
# =============================================================================

cli_gaps_for_extension:
  missing_apis:
    - gap: "listSources(rawDir) → SourceFile[]"
      description: "List all files in raw/ with metadata (name, size, modified date, extension)"
      needed_by: "RawSourcesTreeDataProvider"
      severity: "required"
      implementation_estimate: "~20 lines, similar to listPages()"

    - gap: "getBacklinks(wikiDir, targetPage) → BacklinkResult[]"
      description: "Find all pages that contain links pointing to a given page"
      needed_by: "BacklinksTreeDataProvider, cross-reference features"
      severity: "required"
      implementation_estimate: |
        ~40 lines. Uses existing getPageLinks() to build reverse index.
        Iterate all pages, call getPageLinks(), filter for targetPage.
        Can be cached for performance.

    - gap: "getPageMetadata(wikiDir, pagePath) → WikiPage"
      description: "Read a single page with frontmatter — already exists as readPage(), but extension needs it exposed cleanly"
      needed_by: "Page detail view, hover info"
      severity: "nice_to_have"
      existing: "readPage() in wiki.ts already does this — just needs re-export"

    - gap: "watchWiki(wikiDir, callback) → Disposable"
      description: "File watcher that emits events when wiki pages change"
      needed_by: "Tree view auto-refresh, status bar updates"
      severity: "nice_to_have_in_cli"
      note: "Extension can use vscode.workspace.createFileSystemWatcher() directly — this doesn't need to be in the CLI"

    - gap: "listAllPagesWithMetadata(wikiDir) → PageSummary[]"
      description: "Batch read: list all wiki pages with their frontmatter (type, title, tags, created, updated) without full body"
      needed_by: "WikiPagesTreeDataProvider when index.md is incomplete or for full-fidelity browsing"
      severity: "recommended"
      implementation_estimate: "~30 lines. Iterate listPages(), readPage() each, return array of {path, frontmatter}."

  json_output_gaps:
    - gap: "ingest result lacks source_path in JSON"
      description: "IngestResult has pages_created and pages_updated but not the original source path (resolved)"
      location: "src/commands/ingest.ts:11 — IngestResult interface"
      fix: "Add source_path: string field to IngestResult"

    - gap: "status result lacks page list"
      description: "StatusResult has counts but no list of pages — extension needs the actual pages for tree view"
      location: "src/commands/status.ts:11 — StatusResult interface"
      fix: "Either add pages[] to StatusResult or use readIndex() separately"

    - gap: "lint result lacks fix actions"
      description: "LintResult reports findings but has no structured fix suggestions for the --fix flag"
      location: "src/commands/lint.ts:14 — LintResult interface"
      fix: "Add optional fix_action field to LintFinding for auto-remediation"

  query_improvements:
    current_approach: "Naive substring matching with occurrence counting (countOccurrences)"
    location: "src/commands/query.ts:26-37"
    limitations:
      - "No word boundary matching — 'agent' matches 'reagent'"
      - "No fuzzy matching or typo tolerance"
      - "No TF-IDF or relevance scoring — raw occurrence count favors long documents"
      - "No stemming — 'running' won't match 'run'"
    extension_impact: |
      The query command powers the search feature in the extension.
      Poor search quality directly impacts user experience.
      Consider upgrading to at minimum word-boundary matching and TF-IDF scoring.
    strategic_note: |
      Per STRATEGY.md: "At personal scale (~100s of sources), the index file + QMD search is sufficient."
      For cycle-2, word-boundary matching may be sufficient.
      Full search engine (qmd integration) deferred per strategy.

  cross_reference_analysis:
    current_state: |
      getPageLinks(content) extracts outbound markdown links from page body.
      Lint checks for broken links, orphan pages, stale entries, missing pages.
      No programmatic API to query "what links to X" (backlinks).
    strategy_claim: "Cross-references are already built"
    actual: |
      Cross-references are partially built:
      - Outbound link extraction: YES (getPageLinks in wiki.ts)
      - Broken link detection: YES (lint broken-links category)
      - Orphan detection: YES (lint orphan-pages category)
      - Backlink query API: NO — must iterate all pages and check links
      - Cross-reference graph structure: NO — no in-memory graph model
    recommendation: |
      Add a buildLinkGraph(wikiDir) function that returns:
      { outbound: Map<string, string[]>, inbound: Map<string, string[]> }
      This enables both the backlinks panel and graph visualization features.

  llm_integration_points:
    strategy_claim: "LLM does all the maintenance — summarizing, cross-referencing, filing, updating"
    current_state: |
      The ingest command creates a basic summary page with content preview
      but does NOT invoke any LLM for summarization.
      The query command does substring search but does NOT invoke an LLM
      for synthesis.
      No LLM integration exists in the current codebase.
    extension_relevance: |
      The VS Code extension could provide the LLM integration layer:
      - Use VS Code's built-in Copilot API (vscode.lm namespace) for LLM calls
      - Or shell out to an external LLM CLI tool
      - Extension can intercept ingest and query commands to add LLM processing
    deferral_note: "LLM integration is a separate concern from the VS Code extension shell — can be cycle-3"

# =============================================================================
# SECTION 3: MONOREPO STRUCTURE
# =============================================================================

monorepo_restructure:
  current_structure:
    type: "single-package"
    root: "package.json (llmwiki)"
    entry: "src/cli.ts"
    build: "tsup → dist/cli.js"
    test: "vitest → tests/**/*.test.ts"

  proposed_structure:
    type: "npm-workspaces monorepo"
    layout: |
      llmwiki/
      ├── package.json              # root: workspaces config, shared scripts
      ├── tsconfig.base.json        # shared TypeScript settings
      ├── packages/
      │   ├── shared/               # @llmwiki/shared
      │   │   ├── package.json
      │   │   ├── tsconfig.json     # references tsconfig.base.json
      │   │   └── src/
      │   │       ├── wiki.ts       # ← moved from src/lib/wiki.ts
      │   │       ├── index.ts      # ← moved from src/lib/index.ts
      │   │       ├── log.ts        # ← moved from src/lib/log.ts
      │   │       └── types.ts      # shared interfaces (IndexEntry, WikiPage, etc.)
      │   ├── cli/                   # @llmwiki/cli
      │   │   ├── package.json      # depends on @llmwiki/shared
      │   │   ├── tsconfig.json
      │   │   ├── tsup.config.ts
      │   │   └── src/
      │   │       ├── cli.ts        # ← moved from src/cli.ts
      │   │       └── commands/     # ← moved from src/commands/
      │   └── vscode/               # @llmwiki/vscode
      │       ├── package.json      # depends on @llmwiki/shared, vscode
      │       ├── tsconfig.json
      │       ├── esbuild.config.mjs
      │       └── src/
      │           ├── extension.ts  # activate/deactivate entry point
      │           ├── tree/         # TreeDataProviders
      │           ├── commands/     # command palette handlers
      │           └── statusbar/    # status bar items
      └── tests/
          ├── shared/               # unit tests for shared lib
          ├── cli/                   # CLI-specific tests
          └── vscode/               # extension integration tests

  migration_path:
    step_1: "Add workspaces field to root package.json"
    step_2: "Create packages/shared/ with src/lib/ files and shared interfaces"
    step_3: "Create packages/cli/ with src/cli.ts and src/commands/"
    step_4: "Update imports: commands import from @llmwiki/shared"
    step_5: "Create packages/vscode/ with extension scaffold"
    step_6: "Move tests to match new structure"
    step_7: "Update CI workflow to build all packages"

  code_sharing_analysis:
    already_shareable:
      - file: "src/lib/wiki.ts"
        exports: ["readPage", "writePage", "listPages", "getPageLinks", "WikiPage", "WikiPageFrontmatter"]
        dependencies: ["gray-matter", "node:fs/promises", "node:path"]
        cli_dependency: false

      - file: "src/lib/index.ts"
        exports: ["readIndex", "writeIndex", "addEntry", "removeEntry", "findEntries", "IndexEntry", "FindOptions"]
        dependencies: ["node:fs/promises", "node:path"]
        cli_dependency: false

      - file: "src/lib/log.ts"
        exports: ["appendEntry", "readLog", "getRecentEntries", "LogEntry"]
        dependencies: ["node:fs/promises", "node:path"]
        cli_dependency: false

    needs_refactoring:
      - file: "src/commands/init.ts"
        issue: "initWiki() is clean but AGENTS_CONTENT template is embedded as a string constant"
        action: "Move template to shared/templates/ or keep in CLI — extension doesn't need to init independently"

      - file: "src/commands/query.ts"
        issue: "slugifyQuery() is a utility that could be shared"
        action: "Move to shared/utils.ts"

      - file: "src/commands/status.ts"
        issue: "getWikiStatus() is pure logic, not CLI-specific"
        action: "Move to shared/ — extension needs this directly"

      - file: "src/commands/lint.ts"
        issue: "lintWiki() is pure logic, not CLI-specific"
        action: "Move to shared/ — extension needs this directly"

      - file: "src/commands/ingest.ts"
        issue: "ingestSource() is pure logic, not CLI-specific"
        action: "Move to shared/ — extension needs this directly"

  alternative_approach:
    description: "Keep single package, add extension as separate repo"
    pros:
      - "No migration overhead"
      - "CLI can be published independently"
    cons:
      - "No shared types at compile time"
      - "Duplicated interfaces or runtime JSON parsing"
      - "Harder to keep CLI and extension in sync"
    verdict: "Monorepo is better given the tight coupling and shared TypeScript types"

# =============================================================================
# SECTION 4: COMPETITOR ANALYSIS
# =============================================================================

competitor_analysis:
  foam:
    repo: "github.com/foambubble/foam"
    description: "Personal knowledge management and sharing system for VS Code"
    architecture: "Modular feature system with FoamWorkspace model"
    key_patterns:
      - pattern: "Multiple focused TreeDataProviders"
        detail: "Separate providers for Notes, Tags, Orphans, Placeholders"
        applicability: "HIGH — matches our index-based categories"
      - pattern: "FoamGraph for relationship tracking"
        detail: "In-memory graph of note connections, updated on file changes"
        applicability: "MEDIUM — we need this for backlinks; buildLinkGraph() proposal"
      - pattern: "Event-driven refresh via FileSystemWatcher"
        detail: "Watches .md files, triggers provider refresh on change"
        applicability: "HIGH — standard VS Code pattern"
      - pattern: "WikiLink syntax [[note]]"
        detail: "Custom link format with auto-complete"
        applicability: "LOW — we use standard markdown links [text](path.md)"
    strengths: "Graph visualization, modular architecture, active community"
    weaknesses: "Complex setup (template repo), many recommended extensions"
    lesson_for_llmwiki: "Use multiple focused tree views, not one monolithic tree"

  dendron:
    repo: "github.com/dendronhq/dendron"
    description: "Hierarchical note-taking for VS Code with dot-notation naming"
    architecture: "Client-server model — VS Code extension + express.js backend"
    key_patterns:
      - pattern: "Hierarchy-driven tree view"
        detail: "Notes organized by dot-delimited naming (project.topic.detail)"
        applicability: "LOW — our wiki uses directory-based organization, not dot-notation"
      - pattern: "Powerful note lookup with fuzzy search"
        detail: "Quick-pick based note finder, scalable to thousands of notes"
        applicability: "MEDIUM — we should add a similar quick-pick for Open Wiki Page"
      - pattern: "Client-server architecture"
        detail: "Extension spawns express.js server for heavy operations"
        applicability: "NONE — overengineered for our scale. Direct function calls are sufficient."
    strengths: "Scales to large knowledge bases, powerful refactoring tools"
    weaknesses: "Complex architecture, steep learning curve"
    status: "Still available on marketplace but development appears slowed"
    lesson_for_llmwiki: "Don't overengineer — our ~100s of pages don't need a server"

  memo:
    repo: "github.com/kortina/vscode-markdown-notes"
    description: "Lightweight markdown notes with wiki-links and backlinks"
    architecture: "Minimal — file-based, uses VS Code built-in features heavily"
    key_patterns:
      - pattern: "Backlinks panel as a tree view"
        detail: "Shows all notes referencing the current note"
        applicability: "HIGH — exactly what we need for BacklinksTreeDataProvider"
      - pattern: "Go to Definition for wiki links"
        detail: "Ctrl+click on [[link]] navigates to target note"
        applicability: "MEDIUM — adapt for standard markdown links"
      - pattern: "Minimal custom UI, maximum VS Code reuse"
        detail: "Uses built-in file explorer, markdown preview, quick pick"
        applicability: "HIGH — matches our strategy of minimal infrastructure"
    strengths: "Simple, fast, low maintenance, integrates naturally with VS Code"
    weaknesses: "No graph view, no advanced organization features"
    lesson_for_llmwiki: "Start minimal — built-in VS Code features cover 80% of the need"

  synthesis:
    recommended_approach: |
      Combine Memo's minimalism with Foam's multiple focused tree views:
      1. WikiPagesTreeDataProvider (like Foam's NotesTreeDataProvider, organized by index.md categories)
      2. BacklinksTreeDataProvider (like Memo's backlinks panel)
      3. LintFindingsTreeDataProvider (unique to llmwiki — no competitor has this)
      4. Built-in markdown preview for page rendering (like Memo)
      5. Quick pick for note lookup (inspired by Dendron's lookup)
      6. Defer graph visualization to cycle-3 (Foam-inspired)

