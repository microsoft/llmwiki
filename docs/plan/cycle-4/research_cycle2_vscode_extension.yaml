# =============================================================================
# SECTION 9: RELATED CONVENTIONS
# =============================================================================

related_conventions:
  naming_patterns_in_domain: |
    Functions: verb + noun (readPage, writeIndex, listPages, getBacklinks)
    Interfaces: PascalCase result types (InitResult, LintResult, StatusResult)
    Files: lowercase kebab in commands (init.ts, ingest.ts), lowercase in lib (wiki.ts, index.ts)
    Extension commands: dot-separated IDs (llmwiki.init, llmwiki.query)
  structure_of_domain: |
    Current: src/lib/ (reusable), src/commands/ (CLI-specific)
    Proposed: packages/shared/ (reusable), packages/cli/ (CLI), packages/vscode/ (extension)
  error_handling_in_domain: |
    All functions use try-catch with graceful defaults (empty arrays, null dates).
    Error status returned in result objects (IngestResult.error), not thrown.
    Extension should follow same pattern — show VS Code error notifications, don't crash.
  testing_in_domain: |
    vitest for all tests (192 passing). Three tiers: unit, command, e2e.
    Commands tested by importing functions directly with tmp dirs.
    E2E tests use child_process to test built binary.
    Extension tests should add @vscode/test-electron for integration.
  documentation_in_domain: |
    JSDoc comments on all exported functions.
    ARCHITECTURE.md covers system design, data flow, and design decisions.
    STRATEGY.md covers priorities and anti-patterns.

