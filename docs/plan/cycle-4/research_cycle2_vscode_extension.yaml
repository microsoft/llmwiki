# =============================================================================
# SECTION 6: PATTERNS FOUND
# =============================================================================

patterns_found:
  - category: architecture
    pattern: "Clean separation of business logic from CLI registration"
    description: |
      Every command exports both a pure async function (e.g., initWiki, lintWiki)
      and a registerXCommand function that wires it to commander.
      The pure functions have no dependency on commander, process, or console.
    examples:
      - file: src/commands/init.ts
        location: "init.ts:126 vs init.ts:180"
        snippet: "export async function initWiki(targetPath) vs export function registerInitCommand(wiki: Command)"
    prevalence: common

  - category: architecture
    pattern: "Typed result interfaces for every command"
    description: |
      Each command defines a result interface (InitResult, IngestResult, QueryOutput, LintResult, StatusResult)
      with a 'command' field and typed status/data fields.
      Commands return these directly; JSON serialization happens only at the CLI boundary.
    examples:
      - file: src/commands/status.ts
        location: "status.ts:11"
        snippet: "export interface StatusResult { command: string; source_count: number; ... }"
    prevalence: common

  - category: structure
    pattern: "Two-layer source organization: lib/ for reusable modules, commands/ for command handlers"
    description: "lib/ contains pure data operations (wiki, index, log). commands/ orchestrates lib/ calls and adds CLI formatting."
    examples:
      - file: src/lib/wiki.ts
        location: "wiki.ts:1"
        snippet: "Pure functions: readPage, writePage, listPages, getPageLinks — no commander imports"
    prevalence: common

  - category: testing
    pattern: "Three-tier test organization: unit, commands, e2e"
    description: |
      tests/unit/ — pure function tests (CLI structure, program creation)
      tests/commands/ — command logic tests using tmp dirs (import functions directly)
      tests/lib/ — library function tests
      tests/e2e/ — subprocess tests (execFile to built CLI binary)
    examples:
      - file: tests/e2e/cli.test.ts
        location: "cli.test.ts:26"
        snippet: "function runCLI(args, cwd, json = false): Promise<RunResult>"
    prevalence: common

  - category: error_handling
    pattern: "Graceful degradation with try-catch returning empty defaults"
    description: "Functions return sensible defaults (empty arrays, 0 counts) when wiki is uninitialized or files are missing, rather than throwing."
    examples:
      - file: src/lib/wiki.ts
        location: "wiki.ts:41"
        snippet: "catch { return []; } // listPages returns empty array if dir missing"
      - file: src/commands/status.ts
        location: "status.ts:37"
        snippet: "catch { /* raw/ doesn't exist — 0 sources */ }"
    prevalence: common

  - category: naming
    pattern: "Verb-based function names with wiki/page domain terminology"
    description: "readPage, writePage, listPages, readIndex, addEntry, appendEntry, findEntries — consistent verb+noun naming"
    examples:
      - file: src/lib/index.ts
        location: "index.ts throughout"
        snippet: "readIndex, writeIndex, addEntry, removeEntry, findEntries"
    prevalence: common

