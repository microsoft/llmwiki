      relationship: "imports readIndex, findEntries, IndexEntry"
    - from: "vscode extension"
      to: "commands/status.ts"
      relationship: "imports getWikiStatus"
    - from: "vscode extension"
      to: "commands/lint.ts"
      relationship: "imports lintWiki"
    - from: "vscode extension"
      to: "commands/ingest.ts"
      relationship: "imports ingestSource"
    - from: "vscode extension"
      to: "commands/query.ts"
      relationship: "imports queryWiki"

