plan_id: cycle-4
objective: "MCP Server + Smart Write Operations - expose wiki as MCP tools so external LLM agents can orchestrate intelligent ingest, cross-referencing, and page updates"
created_at: "2026-04-10"
created_by: gem-planner
status: active
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 10
  risk_score: low

tldr: |
  Cycle-4 makes the wiki intelligent by exposing it as an MCP server. Wave 1 delivers the MCP server
  foundation with 7 read-only tools (DONE) plus tech debt fixes (error handling, E2E tests). Wave 2 adds
  smart write tools (write-page, update-page, create-entity, create-concept, add-crosslinks) and enhanced
  ingest with context. Wave 3 adds MCP integration tests, security review, and documentation. Wave 4
  delivers a smart ingest workflow walkthrough. Total: 11 tasks across 4 waves.

open_questions:
  - "Should MCP write tools require valid frontmatter on every write, or allow partial updates?"
  - "Should GitHub Actions ingest.yml be updated to use MCP for LLM-powered ingest? (deferred - adds cost)"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "MCP write tools corrupt wiki state (missing frontmatter, broken index)"
      likelihood: medium
      impact: high
      mitigation: "All write tools validate frontmatter and auto-update index. Path traversal guards on all file operations."
    - scenario: "Smart write operations break existing tests"
      likelihood: low
      impact: medium
      mitigation: "New write functions are additive - existing read-only code unchanged. Full test suite run after each task."
    - scenario: "MCP SDK updates break server compatibility"
      likelihood: low
      impact: medium
      mitigation: "Pin @modelcontextprotocol/sdk version. Use stable API surface only."
  assumptions:
    - "All existing tests continue to pass throughout the cycle"
    - "stdio transport is sufficient (no SSE needed for personal use)"
    - "Write tools should enforce wiki conventions (valid frontmatter, index updates)"

implementation_specification:
  code_structure: |
    Wave 1: MCP server foundation (c4-01 DONE) + error handling cleanup + E2E test fixes.
    Wave 2: Four parallel tasks adding write MCP tools + enhanced ingest.
    Wave 3: Integration tests + security review + documentation updates.
    Wave 4: Smart ingest workflow walkthrough demonstrating end-to-end LLM-powered ingest.

  affected_areas:
    - "packages/shared/src/mcp/ - server.ts, read-tools.ts (done), write-tools.ts (new)"
    - "packages/shared/src/errors.ts - new error type guards"
    - "packages/shared/src/ - all modules with bare catch blocks"
    - "packages/shared/src/wiki.ts - updatePage(), createEntityPage(), createConceptPage()"
    - "packages/shared/src/ingest.ts - enhanced IngestResult with context"
    - "packages/shared/src/crosslinks.ts - addCrosslinks()"
    - "tests/ - MCP integration tests, updated E2E tests"

  component_details:
    - component: "@llmwiki/shared MCP write tools"
      responsibility: "Write operations exposed as MCP tools for LLM agents"
      interfaces:
        - "wiki_write_page - create or overwrite a wiki page with frontmatter validation"
        - "wiki_update_page - merge partial updates into existing page"
        - "wiki_create_entity - create entity page with proper frontmatter + index entry"
        - "wiki_create_concept - create concept page with proper frontmatter + index entry"
        - "wiki_add_crosslinks - add markdown links between pages"
        - "wiki_update_index - update summary/tags of existing index entry"
        - "wiki_ingest_with_context - ingest source AND return relevant existing pages"

    - component: "@llmwiki/shared errors"
      responsibility: "Type-safe error handling helpers replacing bare catch blocks"
      interfaces:
        - "isNotFoundError(err) - true for ENOENT errors"
        - "isPermissionError(err) - true for EACCES errors"

  dependencies:
    - component: "@llmwiki/shared MCP"
      relationship: "write-tools.ts depends on wiki.ts, index-ops.ts, ingest.ts"
    - component: "@llmwiki/cli"
      relationship: "mcp.ts registers all tools via createMcpServer()"

