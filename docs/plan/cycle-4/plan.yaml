        description: "readIndex uses bare catch"
      - path: packages/shared/src/log.ts
        description: "appendEntry has bare catch"
      - path: packages/shared/src/sources.ts
        description: "listSources has bare catch"
    acceptance_criteria:
      - "packages/shared/src/errors.ts exports isNotFoundError() and isPermissionError()"
      - "All bare catch {} blocks replaced with type-safe guards"
      - "Non-ENOENT errors propagate instead of being silently swallowed"
      - "All existing tests pass"
      - "Exported from shared barrel"

