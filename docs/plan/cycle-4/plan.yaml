      wiki_status, wiki_query, wiki_lint, wiki_list_pages, wiki_list_sources,
      wiki_read_page, wiki_read_index. Register 'plaid wiki mcp' CLI subcommand.
    wave: 1
    agent: gem-implementer
    prototype: false
    priority: critical
    status: completed
    dependencies: []
    conflicts_with: []
    context_files:
      - path: packages/shared/src/mcp/server.ts
        description: "createMcpServer() factory"
      - path: packages/shared/src/mcp/read-tools.ts
        description: "7 read-only MCP tool registrations"
      - path: packages/cli/src/commands/mcp.ts
        description: "registerMcpCommand() CLI registration"
    acceptance_criteria:
      - "createMcpServer() returns configured MCP server"
      - "7 read-only tools registered and functional"
      - "CLI 'plaid wiki mcp' starts MCP server on stdio"
