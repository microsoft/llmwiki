  - id: c4-04
    title: "Smart write MCP tools: wiki_write_page and wiki_update_page"
    description: |
      Add write-capable MCP tools for page creation and updates:

      1. Create packages/shared/src/mcp/write-tools.ts
      2. Implement wiki_write_page tool:
         - Input: pagePath, frontmatter (type, title, tags), body content
         - Validates frontmatter has required fields (type, title)
         - Creates or overwrites page at wiki/{pagePath}
         - Adds/updates index entry automatically
         - Path traversal guard (assertWithinDir)
      3. Implement wiki_update_page tool:
         - Input: pagePath, updates (partial frontmatter, body append/replace)
         - Reads existing page, merges updates
         - Updates index entry if metadata changed
         - Fails gracefully if page doesn't exist
      4. Register both tools in createMcpServer()
      5. Write unit tests for both tools
