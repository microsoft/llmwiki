    title: "Improved error handling with type-safe guards"
    description: |
      Replace bare catch {} blocks across the codebase with type-safe error guards:

      1. Create packages/shared/src/errors.ts:
         - isNotFoundError(err: unknown): boolean - checks for ENOENT
         - isPermissionError(err: unknown): boolean - checks for EACCES
      2. Export from shared barrel index.ts
      3. Replace all bare catch {} blocks (17+ instances) across:
         - packages/shared/src/wiki.ts
         - packages/shared/src/index-ops.ts
         - packages/shared/src/log.ts
         - packages/shared/src/sources.ts
         - packages/shared/src/backlinks.ts
         - packages/shared/src/lint.ts
         - packages/shared/src/ingest.ts
         - packages/shared/src/status.ts
         - packages/shared/src/query.ts
      4. Pattern: catch (err) { if (isNotFoundError(err)) { <handle> } else { throw err; } }
      5. All existing tests must pass after refactor
    wave: 1
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: packages/shared/src/wiki.ts
