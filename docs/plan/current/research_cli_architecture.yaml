domain_security_considerations:
  sensitive_areas:
    - area: "LLM API key storage"
      location: ".llmwiki/config.yaml, GitHub Secrets"
      concern: "API keys must never be committed. config.yaml should be in .gitignore. GitHub Actions uses repository secrets. CLI reads from env var LLM_API_KEY or config file."
    - area: "Prompt injection via source documents"
      location: "raw/ → LLM ingest pipeline"
      concern: "Malicious source docs could contain prompt injection. Mitigation: system prompt instructs LLM to treat source content as data, not instructions. Not a hard security boundary for personal use."
  authentication_patterns_in_domain: |
    - LLM API: API key from environment variable or config file
    - GitHub API: GITHUB_TOKEN in Actions (auto-provided), PAT for CLI if pushing to remote
    - No user authentication — single-user tool
  authorization_patterns_in_domain: |
    - GitHub Actions: permissions: contents: write scoped in workflow
    - CLI: operates on local filesystem, no authorization layer needed
    - GitHub fine-grained token: scope to single repo for CLI remote operations
  data_validation_in_domain: |
    - Validate source file exists before ingest
    - Validate wiki directory structure exists (suggest init if missing)
    - Validate frontmatter schema on wiki pages during lint
    - Validate config file has required fields (provider, api_key)

