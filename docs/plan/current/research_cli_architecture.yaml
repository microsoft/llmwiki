plan_id: current
objective: Research CLI architecture, wiki data model, TypeScript setup, GitHub Actions, and competitive landscape to inform the initial LLM Wiki execution plan
focus_area: cli-architecture-and-project-foundation
created_at: "2026-04-09"
created_by: gem-researcher
status: completed

tldr: |
  - **Commander.js** is the recommended CLI framework — mature, simple, excellent subcommand support, adequate TypeScript types. Clipanion is the TS-native alternative but has a smaller ecosystem. Yargs and Citty are viable but offer no compelling advantage for this use case.
  - **Project toolchain**: TypeScript + ESM (`"type": "module"`), tsup (esbuild-based bundler), vitest for testing, tsx for dev. tsconfig targets `ES2022`/`NodeNext`. Single-file CLI output via `bin` field in package.json. This is the current industry-standard stack for Node.js CLI tools.
  - **Wiki data model**: Three-tier directory structure (`raw/`, `wiki/`, schema). Wiki pages use YAML frontmatter (type, title, tags, sources, created/updated dates). `index.md` is a categorized catalog with one-line summaries per page — serves as the LLM's navigation entry point. `log.md` is append-only with parseable `## [date] verb | subject` format.
  - **GitHub Actions**: Use `GITHUB_TOKEN` (not PAT) for commits-back-to-repo to prevent infinite trigger loops. `stefanzweifel/git-auto-commit-action@v5` handles the commit/push. Workflow triggers on `push` to `raw/**` plus `workflow_dispatch` for CLI-triggered manual runs. LLM API key stored as repo-level secret.
  - **Competitive gap**: No existing tool combines LLM-driven wiki maintenance + git-native storage + CLI automation. NotebookLM does per-session RAG (no persistence). Obsidian plugins add AI features but don't maintain the wiki. Foam/Dendron are structural tools without LLM integration. LLM Wiki's differentiator is the compounding, persistent artifact.

