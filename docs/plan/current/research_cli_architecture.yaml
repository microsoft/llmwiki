competitive_analysis:
  existing_tools:
    - name: "Google NotebookLM"
      approach: "Per-session RAG. Upload sources, AI answers questions with citations. No persistent compiled artifact."
      strengths: "Zero setup, grounded responses with citations, audio overviews"
      weaknesses: "No persistent wiki. Knowledge re-derived every session. Cloud-only. No automation, no CLI, no git."
      llmwiki_differentiator: "LLM Wiki compiles knowledge once, keeps it current. NotebookLM re-discovers on every query."

    - name: "Obsidian + AI plugins (Text Generator, Smart Connections)"
      approach: "Local markdown vault with plugin-based AI features. User manually organizes; AI assists with generation and linking."
      strengths: "Full data ownership, rich plugin ecosystem, graph view, local-first"
      weaknesses: "AI is assistive, not autonomous. User must still organize, link, and maintain. No automated ingest pipeline."
      llmwiki_differentiator: "LLM Wiki automates ALL maintenance. Obsidian is a great reader for the output but doesn't replace the automation."

    - name: "Foam (VS Code)"
      approach: "VS Code extension for markdown-based knowledge management. Wikilinks, backlinks, graph view."
      strengths: "Built on VS Code, git-native, developer-friendly"
      weaknesses: "No AI/LLM integration. No automation. Manual maintenance. Smaller community than Obsidian."
      llmwiki_differentiator: "LLM Wiki adds the automation layer that Foam lacks. Could potentially use Foam as a complementary reader."

    - name: "Dendron (VS Code)"
      approach: "Hierarchical note-taking in VS Code. Strict naming conventions, schema-driven."
      strengths: "Scales well for large wikis, strict organization, lookup by hierarchy"
      weaknesses: "No LLM integration. Complex setup. Learning curve. Less active development."
      llmwiki_differentiator: "LLM Wiki uses LLM for organization instead of user-enforced hierarchy. Simpler conventions."

    - name: "Logseq"
      approach: "Local-first outliner with graph view. Block-based editing. Open source."
      strengths: "Privacy-first, powerful queries, task management built-in"
      weaknesses: "Limited native AI. Outliner format less suited to long-form wiki pages. No CLI."
      llmwiki_differentiator: "LLM Wiki produces full wiki pages, not outlines. Git-native. CLI-first for automation."

  key_insight: |
    No existing tool occupies the LLM Wiki's niche: a fully LLM-maintained, git-native, CLI-operable
    personal knowledge base that compiles persistent artifacts. Existing tools either:
    (a) use AI for per-session retrieval without persistence (NotebookLM), or
    (b) use AI as an assistant within a manually-maintained system (Obsidian plugins), or
    (c) provide structure without AI automation (Foam, Dendron, Logseq).
    The compounding, zero-maintenance wiki IS the differentiator.

cli_framework_analysis:
  recommendation: commander
  rationale: |
    Commander.js is recommended for the LLM Wiki CLI based on the following factors:
    1. Simplicity: Low learning curve, declarative API, exact fit for 5-subcommand CLI
    2. Maturity: Most popular CLI framework, extensive documentation, battle-tested
    3. Subcommand support: Native .command() API matches init/ingest/query/lint/status
    4. Global options: program.opts() pattern works well for --json flag
    5. TypeScript support: Adequate types via DefinitelyTyped (not native, but sufficient)
    6. Auto help: Built-in --help generation for all commands
    Clipanion was considered for its native TypeScript, but the smaller ecosystem and
    steeper learning curve don't justify the switch for a 5-command CLI. Yargs is more
    verbose. Citty is too lightweight for subcommand patterns.

  alternatives_considered:
    - name: clipanion
      verdict: "Strong TS-native alternative. Consider if type safety becomes a pain point with commander."
    - name: yargs
      verdict: "Viable but more verbose. Better for complex argument parsing, which this CLI doesn't need."
    - name: citty
      verdict: "Too lightweight. Better for simple scripts, not subcommand CLIs."

wiki_data_model:
  directory_structure: |
    wiki/
    ├── index.md              # Categorized catalog — LLM reads this first
    ├── log.md                # Append-only chronological record
    ├── concepts/             # Concept pages (abstract ideas, patterns)
    ├── entities/             # Entity pages (people, organizations, places)
    ├── sources/              # Source summary pages (one per ingested source)
    └── analyses/             # Filed query results and syntheses

  frontmatter_schema: |
    ---
    type: concept | entity | source | analysis | overview
    title: string (required)
    tags: string[] (optional, for categorization)
    sources: string[] (optional, filenames in raw/ this page draws from)
    aliases: string[] (optional, alternative names for this entity/concept)
    created: ISO-8601 date (required, set on creation)
    updated: ISO-8601 date (required, updated on modification)
    ---

  index_format: |
    # Wiki Index

    > Last updated: {ISO-date}
    > Pages: {count} | Sources: {count}

    ## Concepts
    - [Page Title](concepts/filename.md) — One-line summary

    ## Entities
    - [Page Title](entities/filename.md) — One-line summary

    ## Sources
    - [Page Title](sources/filename.md) — One-line summary

    ## Analyses
    - [Page Title](analyses/filename.md) — One-line summary

  log_format: |
    # Wiki Log

    ## [2026-04-09] ingest | Article Title
    Processed raw/article.md. Created concepts/new-concept.md, updated entities/existing-entity.md.
    Pages touched: 3. Sources total: 12.

    ## [2026-04-09] query | What is X?
    Searched 5 pages. Answer filed as analyses/what-is-x.md.

    ## [2026-04-09] lint | Health check
    Found: 2 orphan pages, 1 missing cross-reference. Fixed: 1 stale summary.

typescript_project_setup:
  package_json_essentials: |
    {
      "name": "llmwiki",
      "type": "module",
      "bin": { "llmwiki": "./dist/cli.js" },
      "engines": { "node": ">=18" },
      "scripts": {
        "dev": "tsx watch src/cli.ts",
        "build": "tsup",
        "test": "vitest",
        "test:ci": "vitest run",
        "typecheck": "tsc --noEmit",
        "lint": "eslint src/"
      }
    }

  tsconfig_essentials: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "NodeNext",
        "moduleResolution": "NodeNext",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true,
        "noEmit": true,
        "outDir": "dist",
        "rootDir": "src",
        "resolveJsonModule": true,
        "isolatedModules": true,
        "declaration": true
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist", "test"]
    }

  tsup_config: |
    import { defineConfig } from 'tsup';
    export default defineConfig({
      entry: ['src/cli.ts'],
      format: ['esm'],
      dts: false,
      splitting: false,
      sourcemap: true,
      clean: true,
      platform: 'node',
      target: 'node18',
      banner: { js: '#!/usr/bin/env node' },
    });

  key_decisions:
    - decision: "ESM-only output (no CJS dual)"
      rationale: "CLI tool, not a library. No consumers need CJS. Simpler build."
    - decision: "tsup over raw esbuild"
      rationale: "Zero-config wrapper, handles shebang, sourcemaps, clean output. Less config to maintain."
    - decision: "vitest over jest"
      rationale: "Native ESM/TypeScript support, faster, Jest-compatible API, better DX."
    - decision: "tsx for development"
      rationale: "Fast TypeScript execution without build step. Replaces ts-node."
    - decision: "tsc --noEmit for type checking"
      rationale: "Separate type checking from build. tsup handles emit, tsc validates types."

github_actions_patterns:
  ingest_workflow_design: |
    Trigger: push to raw/** OR workflow_dispatch with source input
    Guard: if: github.actor != 'github-actions[bot]' (prevent infinite loops)
    Token: GITHUB_TOKEN (auto-provided, prevents re-trigger on commit)
    Steps:
      1. actions/checkout@v4
      2. Setup Node.js (actions/setup-node@v4)
      3. npm ci (install CLI dependencies)
      4. Run: npx llmwiki ingest --json (process new sources)
      5. stefanzweifel/git-auto-commit-action@v5 (commit wiki updates)
    Secrets: LLM_API_KEY (repo-level secret for LLM provider)
    Permissions: contents: write

  cli_trigger_pattern: |
    CLI can trigger workflow_dispatch via GitHub API or gh CLI:
      gh workflow run ingest.yml --field source=raw/new-article.md
    This allows the CLI to delegate ingest to Actions (cloud processing)
    instead of running locally. Useful when local LLM API access isn't available.

  key_considerations:
    - "GITHUB_TOKEN commits don't trigger workflows — this IS the loop prevention"
    - "PAT commits DO trigger workflows — avoid PATs for commit-back"
    - "workflow_dispatch allows CLI to trigger remote ingest"
    - "concurrency: group prevents parallel ingest runs from conflicting"
    - "Free tier: 2000 Actions minutes/month sufficient for personal use"

open_questions:
  - question: "Which LLM provider SDK to use as default?"
    context: "The CLI needs to call an LLM API for ingest and query. Options include OpenAI SDK, Anthropic SDK, or a provider-agnostic wrapper like Vercel AI SDK. The choice affects config format, error handling, and feature set (streaming, tool use, etc.)."
    type: research
    affects: ["cli-implementation", "config-design"]

  - question: "Should the CLI support multiple LLM providers or start with one?"
    context: "Starting with one provider (e.g., OpenAI) is simpler. But the strategy mentions flexibility. A provider-agnostic interface (abstract LLMService) with one concrete implementation is a good middle ground."
    type: research
    affects: ["cli-implementation"]

  - question: "How should llmwiki query find relevant pages without embeddings?"
    context: "STRATEGY.md explicitly rejects embedding-based RAG. The idea.md suggests reading index.md first, then drilling into relevant pages. For ~100s of pages this works, but the LLM context window may be a constraint. Need to determine: does the LLM read the full index.md, then selected pages? Or does the CLI pre-filter with text search?"
    type: research
    affects: ["query-implementation"]

  - question: "Where should the CLI package live — monorepo with wiki or separate repo?"
    context: "The CLI could live in cli/ within the wiki repo template, or be a separate npm-published package. Prior research suggests cli/ within repo. But if published to npm, it needs its own repo or monorepo structure."
    type: nice_to_know
    affects: ["project-structure"]

gaps:
  - area: "LLM provider SDK evaluation"
    description: "Did not deeply evaluate specific LLM provider SDKs (OpenAI, Anthropic, Vercel AI SDK). Need to determine which to use as default and whether to abstract behind an interface."
    impact: research_blocker
    affects: ["cli-implementation"]

  - area: "Ingest prompt engineering"
    description: "The research covers architecture but not the actual LLM prompts for ingest (how to instruct the LLM to generate wiki pages, update index, maintain cross-references). This is critical for quality."
    impact: research_blocker
    affects: ["ingest-implementation"]

  - area: "Config file format details"
    description: "Identified .llmwiki/config.yaml as the config location but did not fully specify the schema (provider selection, model name, temperature, custom prompts, etc.)."
    impact: nice_to_know
    affects: ["cli-implementation"]
