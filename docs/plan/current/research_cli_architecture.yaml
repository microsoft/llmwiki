patterns_found:
  - category: architecture
    pattern: "Command-per-file with shared services"
    description: "Modern TypeScript CLIs use one file per command under src/commands/, with shared business logic in src/services/. Commands receive injected services for testability. A central cli.ts file wires commander.js program definition, registers commands, and handles global options like --json."
    examples:
      - file: "(industry pattern)"
        location: "src/commands/{command}.ts"
        snippet: |
          // Each command exports an action handler
          export async function ingestAction(source: string, opts: IngestOpts, globalOpts: GlobalOpts) {
            const result = await ingestService.run(source, opts);
            if (globalOpts.json) console.log(JSON.stringify(result));
            else renderHuman(result);
          }
    prevalence: common

  - category: architecture
    pattern: "Output formatter pattern for --json flag"
    description: "CLI commands return plain objects. A shared output formatter checks the --json global flag: if true, JSON.stringify; if false, render human-readable colored text. This separates presentation from logic and enables agent interop."
    examples:
      - file: "(industry pattern)"
        location: "src/utils/output.ts"
        snippet: |
          export function output(data: unknown, json: boolean): void {
            if (json) { process.stdout.write(JSON.stringify(data, null, 2) + '\n'); }
            else { /* human-readable format */ }
          }
    prevalence: common

  - category: structure
    pattern: "ESM-first TypeScript CLI project layout"
    description: |
      Modern layout uses package.json "type": "module", tsconfig with module: "NodeNext",
      tsup for bundling to single ESM file, vitest for testing. Entry point has #!/usr/bin/env node shebang.
      Build produces dist/index.js mapped to bin field.
    examples:
      - file: "(industry pattern)"
        location: "package.json + tsconfig.json"
        snippet: |
          // package.json
          { "type": "module", "bin": { "llmwiki": "./dist/index.js" } }
          // tsconfig.json
          { "module": "NodeNext", "moduleResolution": "NodeNext", "noEmit": true }
    prevalence: common

  - category: naming
    pattern: "YAML frontmatter for wiki pages"
    description: "Wiki markdown pages use YAML frontmatter for machine-readable metadata. Common fields: type (entity/concept/source/analysis), title, tags[], sources[], created, updated, aliases[]. This enables Obsidian Dataview queries and LLM-driven catalog generation."
    examples:
      - file: "(industry pattern)"
        location: "wiki/{page}.md frontmatter"
        snippet: |
          ---
          type: concept
          title: Transformer Architecture
          tags: [ml, nlp, architecture]
          sources: [attention-is-all-you-need.pdf]
          created: 2026-04-09
          updated: 2026-04-09
          ---
    prevalence: common

  - category: architecture
    pattern: "index.md as categorized wiki catalog"
    description: |
      The wiki index.md serves dual purpose: human TOC and LLM navigation entry point.
      Structure: H1 title, then H2 sections per category (Concepts, Entities, Sources, Analyses).
      Each entry is a markdown link followed by a pipe-separated one-line summary.
      The LLM reads this first to locate relevant pages before drilling into them.
    examples:
      - file: "(recommended pattern)"
        location: "wiki/index.md"
        snippet: |
          ## Concepts
          - [Transformer Architecture](concepts/transformer-architecture.md) — Neural network architecture using self-attention
          - [Tokenization](concepts/tokenization.md) — Converting text to numerical tokens

          ## Sources
          - [Attention Is All You Need](sources/attention-is-all-you-need.md) — Vaswani et al. 2017, foundational transformer paper
    prevalence: common

  - category: architecture
    pattern: "GitHub Actions commit-back with loop prevention"
    description: |
      Workflows that modify repo content use GITHUB_TOKEN (not PAT) for commits.
      GITHUB_TOKEN-authored commits do NOT trigger further workflow runs, preventing infinite loops.
      stefanzweifel/git-auto-commit-action@v5 is the standard action for detecting, committing,
      and pushing changes. Workflow also guards with: if: github.actor != 'github-actions[bot]'.
    examples:
      - file: "(industry pattern)"
        location: ".github/workflows/ingest.yml"
        snippet: |
          on:
            push:
              paths: ['raw/**']
            workflow_dispatch:
              inputs:
                source: { description: 'Source file path', required: true }
          permissions:
            contents: write
          jobs:
            ingest:
              if: github.actor != 'github-actions[bot]'
              steps:
                - uses: actions/checkout@v4
                - run: npx llmwiki ingest "${{ github.event.inputs.source || 'auto' }}"
                  env:
                    LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
                - uses: stefanzweifel/git-auto-commit-action@v5
                  with:
                    commit_message: "[ingest] Process new sources"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "CLI tool (llmwiki)"
      responsibility: "Primary interface for all wiki operations. Commands: init, ingest, query, lint, status. Outputs human-readable text or structured JSON (--json flag)."
      location: "cli/ (to be created)"
      relationship_to_domain: "This IS the domain — the core deliverable"

    - component: "Wiki data layer"
      responsibility: "Markdown files with YAML frontmatter, organized in wiki/ directory. index.md catalog, log.md chronological record."
      location: "wiki/ (created by llmwiki init)"
      relationship_to_domain: "CLI reads and writes this layer"

    - component: "Raw sources layer"
      responsibility: "Immutable source documents. CLI ingests from here."
      location: "raw/ (created by llmwiki init)"
      relationship_to_domain: "CLI reads from this layer during ingest"

    - component: "GitHub Actions workflow"
      responsibility: "Automated ingest pipeline triggered on push to raw/. Runs CLI commands."
      location: ".github/workflows/ingest.yml"
      relationship_to_domain: "Consumer of CLI — calls llmwiki ingest"

  interfaces_used_by_domain:
    - interface: "Commander.js program API"
      location: "npm: commander"
      usage_pattern: "Program definition with .command(), .option(), .action(). Global --json option via program.opts(). Subcommands for init/ingest/query/lint/status."

    - interface: "Node.js fs/path APIs"
      location: "node:fs, node:path"
      usage_pattern: "Read/write wiki files, traverse directory structure, manage raw/ and wiki/ directories"

    - interface: "LLM provider API"
      location: "External (OpenAI, Anthropic, etc.)"
      usage_pattern: "Called during ingest (generate wiki pages) and query (synthesize answers). API key from config or environment variable."

    - interface: "simple-git"
      location: "npm: simple-git"
      usage_pattern: "Git operations: status, add, commit, push. Used by CLI for local repo operations."

  data_flow_involving_domain: |
    CLI Ingest Flow:
    1. User runs: llmwiki ingest raw/article.md
    2. CLI reads source file from raw/
    3. CLI calls LLM API with source content + wiki context (reads index.md for existing pages)
    4. LLM returns: new/updated wiki pages, index updates, log entry
    5. CLI writes wiki/ files, updates index.md, appends to log.md
    6. CLI commits changes via simple-git (or user commits manually)

    CLI Query Flow:
    1. User runs: llmwiki query "What is X?"
    2. CLI reads index.md to find relevant pages
    3. CLI reads relevant wiki pages
    4. CLI calls LLM API with pages + question
    5. LLM returns synthesized answer
    6. CLI outputs answer (text or JSON)

    CLI Init Flow:
    1. User runs: llmwiki init
    2. CLI creates directory structure: raw/, wiki/, wiki/index.md, wiki/log.md, AGENTS.md
    3. CLI initializes config at .llmwiki/config.yaml or prompts for LLM API key

  key_relationships_to_domain:
    - from: "src/cli.ts"
      to: "commander.js"
      relationship: "imports (program definition)"
    - from: "src/commands/*.ts"
      to: "src/services/*.ts"
      relationship: "calls (business logic)"
    - from: "src/services/ingest.ts"
      to: "LLM API"
      relationship: "calls (content generation)"
    - from: "src/services/ingest.ts"
      to: "wiki/ files"
      relationship: "writes"
    - from: "GitHub Actions"
      to: "CLI binary"
      relationship: "invokes (npx llmwiki ingest)"

related_technology_stack:
  languages_used_in_domain:
    - TypeScript
    - YAML (frontmatter, config, Actions workflows)
    - Markdown (wiki pages, raw sources)
    - JSON (CLI --json output, package.json)

  frameworks_used_in_domain:
    - name: "Commander.js"
      usage_in_domain: "CLI framework. Subcommand definition (init/ingest/query/lint/status), option parsing, global --json flag, auto-generated help text. Mature, large ecosystem, adequate TS types."
    - name: "tsup"
      usage_in_domain: "Build/bundle tool. Wraps esbuild for zero-config TypeScript compilation. Produces single ESM file for CLI distribution. Handles shebang insertion, sourcemaps, declaration files."
    - name: "vitest"
      usage_in_domain: "Test framework. Jest-compatible API with native ESM/TypeScript support. Fast watch mode. Used for unit testing commands and services, integration testing CLI output."
    - name: "GitHub Actions"
      usage_in_domain: "CI/CD and automation. Ingest workflow triggered on raw/ push. Uses stefanzweifel/git-auto-commit-action for commit-back."

  libraries_used_in_domain:
    - name: "commander"
      purpose_in_domain: "CLI argument parsing and subcommand routing"
    - name: "simple-git"
      purpose_in_domain: "Programmatic git operations (status, add, commit, push)"
    - name: "chalk"
      purpose_in_domain: "Terminal color output for human-readable mode (optional, consider picocolors for lighter weight)"
    - name: "tsx"
      purpose_in_domain: "Development-time TypeScript execution (fast feedback loop, replaces ts-node)"
    - name: "gray-matter"
      purpose_in_domain: "Parse YAML frontmatter from markdown wiki pages"
    - name: "glob / fast-glob"
      purpose_in_domain: "File discovery for lint command (find all wiki pages)"

related_conventions:
  naming_patterns_in_domain: |
    - CLI command names: lowercase verbs (init, ingest, query, lint, status)
    - Wiki page filenames: kebab-case (transformer-architecture.md, attention-paper.md)
    - Wiki directories: plural nouns (concepts/, entities/, sources/, analyses/)
    - Config file: .llmwiki/config.yaml (dot-prefixed, YAML format)
    - Frontmatter type values: concept | entity | source | analysis | overview
    - Log entries: ## [ISO-date] verb | subject
  structure_of_domain: |
    llmwiki (npm package):
    ├── src/
    │   ├── cli.ts              # Commander.js program definition, entry point
    │   ├── commands/
    │   │   ├── init.ts         # Create wiki directory structure
    │   │   ├── ingest.ts       # Process source → wiki updates
    │   │   ├── query.ts        # Search wiki, synthesize answer
    │   │   ├── lint.ts         # Health-check wiki consistency
    │   │   └── status.ts       # Show recent operations
    │   ├── services/
    │   │   ├── llm.ts          # LLM API client (provider-agnostic)
    │   │   ├── wiki.ts         # Wiki file read/write operations
    │   │   ├── index-manager.ts # Maintain index.md catalog
    │   │   └── log-manager.ts  # Maintain log.md entries
    │   ├── types/
    │   │   ├── config.ts       # Config file schema
    │   │   ├── wiki-page.ts    # Wiki page type (frontmatter + content)
    │   │   └── output.ts       # CLI output types for --json
    │   └── utils/
    │       ├── output.ts       # JSON/human output formatter
    │       ├── config.ts       # Config file loader
    │       └── frontmatter.ts  # YAML frontmatter parser/serializer
    ├── test/
    │   ├── commands/           # Command unit tests
    │   └── services/           # Service unit tests
    ├── package.json
    ├── tsconfig.json
    ├── tsup.config.ts
    └── vitest.config.ts

    Wiki repo (created by llmwiki init):
    ├── raw/                    # Immutable source documents
    │   └── (user drops files here)
    ├── wiki/                   # LLM-generated pages
    │   ├── index.md            # Categorized catalog (LLM navigation entry point)
    │   ├── log.md              # Chronological operation log
    │   ├── concepts/           # Concept pages
    │   ├── entities/           # Entity pages (people, orgs, etc.)
    │   ├── sources/            # Source summary pages
    │   └── analyses/           # Filed query results
    ├── AGENTS.md               # Schema/conventions for LLM
    ├── .llmwiki/
    │   └── config.yaml         # Local config (API keys, provider)
    └── .github/
        └── workflows/
            └── ingest.yml      # Automated ingest on push to raw/
  error_handling_in_domain: |
    - CLI exits with code 0 on success, non-zero on failure
    - --json mode: errors output as { "error": true, "code": "ERR_CODE", "message": "..." }
    - Human mode: colored error messages to stderr
    - LLM API errors: retry up to 3 times with exponential backoff, then surface to user
    - File system errors: clear message about missing files/directories with suggestion to run llmwiki init
  testing_in_domain: |
    - vitest for all tests, with native ESM/TypeScript support
    - Unit tests: mock LLM service, test command logic in isolation
    - Integration tests: test CLI output format (JSON parsing, human output structure)
    - Fixture-based: test/fixtures/ with sample raw sources and expected wiki outputs
    - Coverage targets: services (high), commands (medium), utils (low)
  documentation_in_domain: |
    - Commander.js auto-generates --help for all commands
    - AGENTS.md documents wiki conventions for LLM agents
    - README.md covers installation, quickstart, command reference
    - --json output types documented in src/types/output.ts

