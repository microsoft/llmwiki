plan_id: cycle-5
objective: "Wiki Intelligence + Self-Healing Automation - MCP Resources/Prompts, delete/rename operations, GitHub Actions lint automation, lint auto-fix"
created_at: "2026-04-10"
created_by: gem-planner
status: active
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 14
  risk_score: low

tldr: |
  Cycle-5 deepens the wiki's intelligence and automation. Wave 1 fixes E2E test flakiness, adds the
  missing delete-page operation, and exposes wiki content as MCP Resources. Wave 2 adds rename-page
  with backlink rewriting, MCP Prompt templates, lint auto-fix mode, and a GitHub Actions lint workflow.
  Wave 3 wires delete/rename into MCP tools + CLI commands, enhances VS Code with smart ingest and
  delete/rename context menus, adds PR-triggered wiki validation, and exposes lint-fix as MCP tool
  with tag-based query filtering. Wave 4 delivers integration tests, security review, and documentation.
  Total: 14 tasks across 4 waves.

open_questions:
  - "Should MCP Resources support subscriptions for real-time updates? (Deferred - read-only for now)"
  - "Should lint --fix expose a wiki_lint_fix MCP tool? (Yes - enables self-healing wiki via agents)"
  - "How should MCP Resources handle large wikis (1000+ pages)? (Hierarchical URIs, defer pagination)"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Delete operation corrupts index or leaves orphaned backlinks"
      likelihood: medium
      impact: high
      mitigation: "deletePage() atomically removes page + index entry + warns about backlinks. Integration tests verify consistency."
    - scenario: "Rename with backlink rewriting misses references in non-standard link formats"
      likelihood: medium
      impact: medium
      mitigation: "Use existing getPageLinks() for link discovery. Test with multiple link formats (relative, absolute, with/without .md)."
    - scenario: "Lint --fix accidentally deletes valid content"
      likelihood: low
      impact: high
      mitigation: "Only fix deterministic issues (stale entries, missing index). Orphan removal requires explicit --fix-orphans flag. All fixes logged."
    - scenario: "MCP Resources listing becomes too large for agent context windows"
      likelihood: low
      impact: medium
      mitigation: "Use hierarchical resource URIs (wiki/entities/, wiki/concepts/). At personal scale (<1000 pages), this is unlikely."
  assumptions:
    - "All 560+ existing tests continue to pass throughout the cycle"
    - "MCP SDK supports Resources and Prompts via ListResourcesRequestSchema and ListPromptsRequestSchema"
    - "Delete is hard-delete (git provides recovery); no trash/ directory needed"
    - "Lint auto-fix is limited to safe, deterministic fixes (stale entries, missing frontmatter defaults)"

implementation_specification:
  code_structure: |
    Wave 1: Test reliability + delete page foundation + MCP Resources.
    Wave 2: Rename page + MCP Prompts + lint auto-fix + GitHub Actions lint workflow.
    Wave 3: Delete/rename MCP tools + CLI + VS Code enhancements + PR validation + lint-fix MCP tool.
    Wave 4: Integration tests + security review + documentation update.

  affected_areas:
    - "packages/shared/src/wiki.ts - deletePage(), renamePage() new functions"
    - "packages/shared/src/mcp/server.ts - add resources + prompts capabilities"
    - "packages/shared/src/mcp/resources.ts - new file for MCP resource handlers"
    - "packages/shared/src/mcp/prompts.ts - new file for MCP prompt templates"
    - "packages/shared/src/mcp/write-tools.ts - wiki_delete_page, wiki_rename_page tools"
    - "packages/shared/src/lint.ts - lintFix() auto-fix mode"
    - "packages/shared/src/query.ts - tag-based filtering"
    - "packages/cli/src/commands/ - delete.ts, rename.ts new commands"
    - "packages/vscode/src/commands.ts - smart ingest, delete, rename commands"
    - ".github/workflows/ - lint-wiki.yml, wiki-validation.yml new workflows"
    - "tests/ - new integration tests for MCP resources, prompts, delete, rename"

  component_details:
    - component: "@llmwiki/shared wiki CRUD"
      responsibility: "Complete page lifecycle: create, read, update, delete, rename"
      interfaces:
        - "deletePage(wikiDir, pagePath) - delete page + remove index entry + return backlink warnings"
        - "renamePage(wikiDir, oldPath, newPath) - rename page, update frontmatter, rewrite backlinks, update index"

    - component: "@llmwiki/shared MCP Resources"
      responsibility: "Expose wiki pages, index, and sources as browsable MCP Resources"
      interfaces:
        - "resource://wiki/index - wiki index as JSON"
        - "resource://wiki/pages/{path} - individual wiki pages"
        - "resource://wiki/sources/{path} - source file listing"

    - component: "@llmwiki/shared MCP Prompts"
      responsibility: "Reusable workflow templates for common agent tasks"
      interfaces:
        - "ingest-and-integrate - ingest source, find related pages, create entities/concepts, crosslink"
        - "lint-and-fix - run lint, auto-fix deterministic issues, report remaining"

    - component: "@llmwiki/shared lint auto-fix"
      responsibility: "Automatically fix deterministic lint findings"
      interfaces:
        - "lintFix(wikiDir) - fix stale index entries, add missing pages to index, add missing frontmatter defaults"

  dependencies:
    - component: "@llmwiki/shared wiki.ts"
      relationship: "deletePage/renamePage depend on index-ops.ts, backlinks.ts"
    - component: "@llmwiki/shared MCP server"
      relationship: "resources.ts and prompts.ts register in createMcpServer()"
    - component: "@llmwiki/cli"
      relationship: "new delete/rename commands wrap shared functions"
    - component: "llmwiki-vscode"
      relationship: "new commands wrap shared functions + trigger tree view refresh"

