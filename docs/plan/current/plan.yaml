    title: "Migrate to npm workspaces monorepo"
    description: |
      Restructure the single-package project into an npm workspaces monorepo with three packages:
      packages/shared (@llmwiki/shared), packages/cli (@llmwiki/cli), and packages/vscode (@llmwiki/vscode).

      Move src/lib/ (wiki.ts, index.ts, log.ts) to packages/shared/src/ with a barrel index.ts export.
      Move src/cli.ts and src/commands/ to packages/cli/src/ with imports updated to use @llmwiki/shared.
      Create packages/vscode/ as an empty scaffold (just package.json with workspace:* dep on shared).

      Update root package.json to declare workspaces. Create tsconfig.base.json for shared compiler options.
      Each package gets its own tsconfig.json extending the base. Move tests/ to match: tests/shared/,
      tests/cli/, preserving existing test files with updated import paths.

      Update .github/workflows/ci.yml to run build and test across all packages.
      All 193 existing tests must pass after migration.
