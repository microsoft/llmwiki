  - id: c2-06
    title: "Implement WikiPages TreeDataProvider"
    description: |
      Create the primary tree view showing all wiki pages organized by category (matching index.md structure).

      WikiPagesTreeDataProvider implements vscode.TreeDataProvider<WikiTreeItem>:
      - Top-level nodes: categories from index.md (Entities, Concepts, Sources)
      - Child nodes: individual pages within each category (title, path, summary as description)
      - Clicking a page opens it in the editor
      - Refresh triggered by FileSystemWatcher on wiki/**/*.md
      - Uses readIndex() from @llmwiki/shared to populate data

      WikiTreeItem extends vscode.TreeItem with contextValue for category vs page distinction.
      Register the provider on the 'wikiPages' view ID declared in package.json.
