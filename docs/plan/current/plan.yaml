plan_id: cycle-1
title: "LLM Wiki CLI Foundation"
description: >
  Build the llmwiki CLI tool in TypeScript/Node.js — the foundation for the entire
  LLM Wiki system. Implements init, ingest, query, lint, and status commands with
  --json support for agent interop. Includes CI workflow and GitHub Actions integration.
created_at: "2026-04-09"
strategy_ref: STRATEGY.md
status: active

waves:
  - wave: 1
    name: "Project Foundation"
    tasks:
      - task_id: "1.1"
        name: "Initialize TypeScript project"
        description: >
          Set up the Node.js/TypeScript project with modern tooling: package.json
          (type: module, bin field for llmwiki), tsconfig.json (ES2022/NodeNext),
          tsup.config.ts for bundling, vitest.config.ts for testing, and a basic
          GitHub Actions CI workflow (.github/workflows/ci.yml) that runs lint,
          build, and test on PRs.
        type: implementation
        acceptance_criteria:
          - "package.json exists with name=llmwiki, type=module, bin field pointing to dist/cli.js"
          - "tsconfig.json targets ES2022 with moduleResolution NodeNext"
          - "tsup.config.ts configured for single CLI entry point bundling"
          - "vitest.config.ts configured with TypeScript support"
          - ".github/workflows/ci.yml runs npm ci, build, lint, test on pull_request and push to main"
          - "npm run build succeeds (even if output is minimal)"
          - "npm test succeeds (even if no tests yet — vitest should exit cleanly)"
        dependencies: []
        estimated_effort: small

      - task_id: "1.2"
        name: "CLI entry point with Commander.js"
        description: >
          Create src/cli.ts as the CLI entry point using Commander.js. Set up the
          program with name, version, description, and a global --json flag. Add
          placeholder subcommands (init, ingest, query, lint, status) that print
          "not yet implemented". Include a shebang line for direct execution.
          Write unit tests verifying --help output and --version output.
        type: implementation
        acceptance_criteria:
          - "src/cli.ts exists with Commander.js program setup"
          - "Running llmwiki --help shows all 5 commands and --json flag"
          - "Running llmwiki --version shows package version"
          - "Global --json flag is parsed and available to subcommands"
          - "Each subcommand (init, ingest, query, lint, status) is registered"
          - "Tests exist verifying CLI help output includes all commands"
          - "npm run build produces dist/cli.js that is executable"
        dependencies: ["1.1"]
        estimated_effort: small

  - wave: 2
    name: "Core Libraries"
    tasks:
      - task_id: "2.1"
        name: "Wiki page library"
        description: >
          Create src/lib/wiki.ts with functions for reading and writing wiki pages.
          Handle YAML frontmatter parsing (using gray-matter). Functions: readPage
          (parse frontmatter + content), writePage (serialize frontmatter + content),
          listPages (glob wiki/ directory), getPageLinks (extract markdown links from
          content). Define TypeScript types for WikiPage (frontmatter fields: type,
          title, tags, sources, created, updated + body content). Write comprehensive
          unit tests with fixture files.
        type: implementation
        acceptance_criteria:
          - "src/lib/wiki.ts exports readPage, writePage, listPages, getPageLinks"
          - "WikiPage type defined with frontmatter fields: type, title, tags, sources, created, updated"
          - "readPage correctly parses YAML frontmatter and markdown body"
          - "writePage correctly serializes frontmatter + body back to markdown"
          - "listPages returns all .md files in wiki/ directory"
          - "getPageLinks extracts internal markdown links from page content"
          - "gray-matter dependency added to package.json"
          - "Unit tests cover all functions with fixture data"
          - "All tests pass"
        dependencies: ["1.1"]
        estimated_effort: medium

      - task_id: "2.2"
        name: "Index file library"
        description: >
          Create src/lib/index.ts with functions for managing wiki/index.md. Functions:
          readIndex (parse the categorized list into structured data), writeIndex
          (serialize structured data back to markdown), addEntry (add a page to the
          appropriate category), removeEntry (remove a page), findEntries (search by
          name/tags). Define IndexEntry type (path, title, summary, category, tags).
          Write unit tests.
        type: implementation
        acceptance_criteria:
          - "src/lib/index.ts exports readIndex, writeIndex, addEntry, removeEntry, findEntries"
          - "IndexEntry type defined with path, title, summary, category, tags fields"
          - "readIndex parses a categorized markdown list into IndexEntry array"
          - "writeIndex serializes IndexEntry array back to categorized markdown"
          - "addEntry inserts into correct category, creating category if needed"
          - "removeEntry removes by path"
          - "findEntries searches by title substring and tags"
          - "Unit tests cover all functions"
          - "All tests pass"
        dependencies: ["1.1"]
        estimated_effort: medium

      - task_id: "2.3"
        name: "Log file library"
        description: >
          Create src/lib/log.ts with functions for managing wiki/log.md. Functions:
          appendEntry (add timestamped entry with format ## [YYYY-MM-DD] verb | subject),
          readLog (parse log into structured entries), getRecentEntries (last N entries).
          Define LogEntry type (date, verb, subject, details). Write unit tests.
        type: implementation
        acceptance_criteria:
          - "src/lib/log.ts exports appendEntry, readLog, getRecentEntries"
          - "LogEntry type defined with date, verb, subject, details fields"
          - "appendEntry writes correctly formatted ## [date] verb | subject entries"
          - "readLog parses existing log file into LogEntry array"
          - "getRecentEntries returns last N entries"
          - "Handles empty/missing log file gracefully"
          - "Unit tests cover all functions"
          - "All tests pass"
        dependencies: ["1.1"]
        estimated_effort: small

  - wave: 3
    name: "Core Commands"
    tasks:
      - task_id: "3.1"
        name: "Init command"
        description: >
          Implement src/commands/init.ts — the llmwiki init command. Creates the
          directory structure (raw/, wiki/, wiki/entities/, wiki/concepts/,
          wiki/sources/), initial files (wiki/index.md with empty category sections,
          wiki/log.md with initialization entry, AGENTS.md with starter schema).
          Supports --path flag for target directory. Supports --json output.
          Detects if already initialized and warns. Write integration tests that
          run init in a temp directory and verify all files created.
        type: implementation
        acceptance_criteria:
          - "src/commands/init.ts implements the init command"
          - "Creates raw/, wiki/, wiki/entities/, wiki/concepts/, wiki/sources/ directories"
          - "Creates wiki/index.md with category headers (Entities, Concepts, Sources)"
          - "Creates wiki/log.md with initialization entry"
          - "Creates AGENTS.md with starter schema template"
          - "--path flag allows specifying target directory"
          - "--json outputs structured result {command, status, created_files, created_dirs}"
          - "Warns if already initialized (wiki/ exists)"
          - "Integration tests verify all files and directories created"
          - "All tests pass"
        dependencies: ["1.2", "2.2", "2.3"]
        estimated_effort: medium

      - task_id: "3.2"
        name: "Status command"
        description: >
          Implement src/commands/status.ts — the llmwiki status command. Reads the
          wiki directory and reports: source count (files in raw/), wiki page count
          (files in wiki/), last ingest date (from log.md), last lint date (from
          log.md), orphan page count (pages not linked from index.md), index coverage
          percentage. Uses the wiki, index, and log libraries. Supports --json output.
          Write tests with fixture directories.
        type: implementation
        acceptance_criteria:
          - "src/commands/status.ts implements the status command"
          - "Reports source count from raw/ directory"
          - "Reports wiki page count from wiki/ directory"
          - "Reports last ingest and lint dates from log.md"
          - "Reports orphan page count (pages not in index.md)"
          - "Reports index coverage percentage"
          - "Human-readable table output by default"
          - "--json outputs structured result"
          - "Handles empty/uninitialized wiki gracefully"
          - "Tests verify correct stats with fixture data"
          - "All tests pass"
        dependencies: ["1.2", "2.1", "2.2", "2.3"]
        estimated_effort: medium

  - wave: 4
    name: "Advanced Commands"
    tasks:
      - task_id: "4.1"
        name: "Lint command"
        description: >
          Implement src/commands/lint.ts — the llmwiki lint command. Runs health
          checks on the wiki: broken internal links, orphan pages (no inbound links),
          index completeness (every wiki page listed), missing pages (concepts
          mentioned but no page exists), stale entries (in index but file missing).
          Each check reports findings with severity (error, warning, info). Supports
          --category flag to run specific checks. Supports --json output. Write
          tests with deliberately broken wiki fixtures.
        type: implementation
        acceptance_criteria:
          - "src/commands/lint.ts implements the lint command"
          - "Checks for broken internal links between wiki pages"
          - "Identifies orphan pages with no inbound links"
          - "Checks index completeness — every .md in wiki/ should be listed"
          - "Finds stale index entries pointing to deleted files"
          - "Each finding has severity (error, warning, info) and description"
          - "--category flag filters to specific check types"
          - "--json outputs structured findings array"
          - "Exit code 1 if any errors found, 0 otherwise"
          - "Tests use broken wiki fixtures to verify each check type"
          - "All tests pass"
        dependencies: ["1.2", "2.1", "2.2"]
        estimated_effort: medium

      - task_id: "4.2"
        name: "Ingest command"
        description: >
          Implement src/commands/ingest.ts — the llmwiki ingest command. Reads a
          source file from raw/, creates a summary wiki page in wiki/sources/,
          updates wiki/index.md with the new entry, appends to wiki/log.md.
          Supports --dry-run flag (shows what would change without writing).
          Supports --json output. For this initial implementation, the summary
          is a structured extraction (metadata + content preview) — full LLM
          summarization will be added later. Write integration tests.
        type: implementation
        acceptance_criteria:
          - "src/commands/ingest.ts implements the ingest command"
          - "Reads source file from specified path"
          - "Creates wiki/sources/{source-name}-summary.md with frontmatter"
          - "Summary page includes: title, source path, date, content excerpt"
          - "Updates wiki/index.md with new entry in Sources category"
          - "Appends ingest entry to wiki/log.md"
          - "--dry-run shows changes without writing files"
          - "--json outputs structured result {pages_created, pages_updated}"
          - "Handles missing source file with clear error"
          - "Integration tests verify file creation and index/log updates"
          - "All tests pass"
        dependencies: ["1.2", "2.1", "2.2", "2.3"]
        estimated_effort: medium

  - wave: 5
    name: "Query & Automation"
    tasks:
      - task_id: "5.1"
        name: "Query command"
        description: >
          Implement src/commands/query.ts — the llmwiki query command. Searches
          the wiki index for relevant pages matching the query string, reads
          matched pages, and outputs results with context. For this initial
          implementation, uses simple text matching against index entries and
          page content (BM25-style scoring). Supports --save flag to write the
          result as a new wiki page. Supports --json output. Write tests.
        type: implementation
        acceptance_criteria:
          - "src/commands/query.ts implements the query command"
          - "Accepts a query string as argument"
          - "Searches index entries by title and summary text"
          - "Reads matched wiki pages for full content"
          - "Ranks results by relevance (simple text matching/frequency)"
          - "Outputs matched pages with excerpts"
          - "--save writes query result as a new wiki page"
          - "--json outputs structured result {query, matches, results}"
          - "Handles no matches gracefully with helpful message"
          - "Tests verify search and ranking with fixture data"
          - "All tests pass"
        dependencies: ["1.2", "2.1", "2.2"]
        estimated_effort: medium

      - task_id: "5.2"
        name: "GitHub Actions ingest workflow"
        description: >
          Create .github/workflows/ingest.yml — auto-ingest workflow that triggers
          on push to raw/**. Sets up Node.js, installs the CLI, detects changed
          files in raw/, runs llmwiki ingest for each, commits wiki updates using
          stefanzweifel/git-auto-commit-action@v5. Also supports workflow_dispatch
          for manual triggering. Configure with GITHUB_TOKEN (not PAT) to prevent
          infinite loops.
        type: implementation
        acceptance_criteria:
          - ".github/workflows/ingest.yml exists and is valid YAML"
          - "Triggers on push to raw/** paths"
          - "Supports workflow_dispatch for manual runs"
          - "Sets up Node.js and runs npm ci"
          - "Detects changed files in raw/ using git diff"
          - "Runs llmwiki ingest for each changed file"
          - "Commits wiki updates with bot user identity"
          - "Uses GITHUB_TOKEN, not a PAT"
          - "Uses stefanzweifel/git-auto-commit-action@v5 or equivalent"
          - "Does not trigger infinite loops (commit from bot won't re-trigger)"
        dependencies: ["4.2"]
        estimated_effort: small

  - wave: 6
    name: "Polish & Integration"
    tasks:
      - task_id: "6.1"
        name: "End-to-end integration tests"
        description: >
          Write comprehensive end-to-end tests that exercise the full CLI workflow:
          init → ingest a source → status → lint → query. Tests run the actual CLI
          binary in a temp directory and verify outputs. Test both human-readable
          and --json output modes. Test error cases (uninitialized wiki, missing
          files, invalid input).
        type: testing
        acceptance_criteria:
          - "E2E test file exists (e.g., tests/e2e/cli.test.ts)"
          - "Tests run the built CLI binary (dist/cli.js) as a subprocess"
          - "Full workflow test: init → ingest → status → lint → query"
          - "Tests verify human-readable output format"
          - "Tests verify --json output structure for each command"
          - "Tests cover error cases: uninitialized wiki, missing files"
          - "Tests use isolated temp directories"
          - "All tests pass"
        dependencies: ["5.1"]
        estimated_effort: medium

      - task_id: "6.2"
        name: "AGENTS.md starter schema"
        description: >
          Create a starter AGENTS.md schema file that documents wiki conventions,
          page types, frontmatter fields, naming conventions, and workflows. This
          is the template created by llmwiki init. Include sections for: page types
          (summary, entity, concept), frontmatter schema, naming conventions, ingest
          workflow steps, lint rules, cross-referencing guidelines.
        type: documentation
        acceptance_criteria:
          - "AGENTS.md template content defined and used by init command"
          - "Documents page types: summary, entity, concept"
          - "Defines frontmatter schema (required and optional fields)"
          - "Specifies naming conventions for wiki pages"
          - "Describes ingest workflow from user perspective"
          - "Lists lint rules and their meanings"
          - "Explains cross-referencing guidelines"
          - "Template is minimal but useful — can be extended"
        dependencies: ["3.1"]
        estimated_effort: small

pre_mortem:
  risks:
    - risk: "Commander.js TypeScript types may need workarounds for ESM"
      mitigation: "Research ESM-compatible Commander.js usage patterns; fall back to Clipanion if blocked"
      severity: low

    - risk: "gray-matter may have ESM compatibility issues"
      mitigation: "Test early in wave 2; fall back to manual YAML frontmatter parsing if needed"
      severity: low

    - risk: "GitHub Actions ingest workflow may trigger infinite loops"
      mitigation: "Use GITHUB_TOKEN (not PAT) which prevents triggering workflows from automated commits"
      severity: medium

    - risk: "Scope creep into LLM-powered features before CLI basics are solid"
      mitigation: "Strategy explicitly defers LLM integration; ingest command does structural extraction only"
      severity: low
