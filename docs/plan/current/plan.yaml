  - id: c2-07
    title: "Implement command palette integration"
    description: |
      Wire all 6 declared commands to actual handlers in the extension:

      1. llmwiki.init: Call initWiki(workspaceFolder). Show info message with result. Only available when
         wiki/index.md does NOT exist (use when clause).
      2. llmwiki.ingest: Show file picker (defaultUri: raw/). Call ingestSource(selectedFile, workspaceFolder, false).
         Show result notification. Also register as context menu on explorer for raw/ files.
      3. llmwiki.query: Show InputBox for query string. Call queryWiki(input, workspaceFolder). Show results
         in a QuickPick list. Selecting a result opens the page.
      4. llmwiki.lint: Call lintWiki(workspaceFolder). Show summary notification. Refresh lint tree view.
      5. llmwiki.status: Call getWikiStatus(workspaceFolder). Show formatted info message.
      6. llmwiki.openPage: Show QuickPick of all pages (from readIndex). Selecting opens the page.
      7. llmwiki.refresh: Refresh all tree views manually.

      All commands import functions from @llmwiki/shared. Use vscode.window for user interaction.
