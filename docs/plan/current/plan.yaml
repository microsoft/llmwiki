  - id: c2-02
    title: "Add listSources and getBacklinks APIs to shared package"
    description: |
      Add two new functions to packages/shared for use by the VS Code extension tree views:

      1. listSources(rawDir: string): Promise<SourceFile[]>
         List all files in raw/ with metadata (name, relative path, size in bytes, modified ISO date, extension).
         Use readdir with recursive flag and stat each file. Return empty array if raw/ doesn't exist.

      2. getBacklinks(wikiDir: string, targetPage: string): Promise<BacklinkResult[]>
         Find all wiki pages that contain links pointing to targetPage. Iterate all pages via listPages(),
         call getPageLinks() on each, filter for links resolving to targetPage. Return source page path,
         title (from frontmatter), and link text.

      Export both from the shared barrel index.ts. Write unit tests for each function.
