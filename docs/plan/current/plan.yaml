plan_id: cycle-2
objective: "Build VS Code extension for interactive wiki browsing on top of the CLI, with monorepo restructure and CLI API enhancements"
created_at: "2025-07-17"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 16
  risk_score: medium

tldr: |
  Cycle-2 transforms the single-package CLI into an npm workspaces monorepo and builds a VS Code
  extension for interactive wiki browsing. Wave 1 migrates to monorepo (packages/shared, packages/cli,
  packages/vscode). Wave 2 adds missing CLI APIs (listSources, getBacklinks) and scaffolds the extension.
  Wave 3 builds core extension features (tree views, command palette, status bar). Wave 4 adds advanced
  tree views (sources, backlinks, lint findings). Wave 5 delivers testing and packaging.
  Total: 13 tasks across 5 waves. 4-way parallelism in waves 2-4.

open_questions:
  - "VS Code Marketplace publisher ID — needed for packaging but not blocking development"
  - "Extension icon — required for marketplace publishing, can be placeholder for now"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Monorepo migration breaks existing 193 tests or CI workflow"
      likelihood: medium
      impact: critical
      mitigation: "Run full test suite after each migration step. Keep original structure in git history for easy revert. CI workflow updated as part of the same task."
    - scenario: "VS Code extension cannot import shared package — bundling resolution failures"
      likelihood: medium
      impact: high
      mitigation: "Use esbuild with explicit externals. Test import resolution in isolation before building features. The embedded library approach is well-proven in Foam/Memo."
    - scenario: "TreeDataProvider refresh causes performance issues with large wikis"
      likelihood: low
      impact: medium
      mitigation: "Cache index reads. Use FileSystemWatcher debouncing (300ms). Lazy-load page bodies only on expand."
    - scenario: "npm workspaces hoisting causes version conflicts with gray-matter or commander"
      likelihood: low
      impact: medium
      mitigation: "Pin dependency versions. Use workspace protocol (workspace:*) for internal packages. Test with npm ci from clean state."
  assumptions:
    - "VS Code extension API ^1.85.0 is stable and sufficient for all planned features"
    - "esbuild can bundle the shared package into the extension without issues"
    - "The existing 193 tests will pass after monorepo migration with only import path changes"
    - "Personal wiki scale (~100s of pages) means no need for pagination or virtual scrolling in tree views"
    - "Built-in VS Code markdown preview is sufficient — no custom webview needed in cycle-2"

implementation_specification:
  code_structure: |
    npm workspaces monorepo with three packages:
    - packages/shared: Core wiki operations (wiki.ts, index.ts, log.ts) + new APIs (listSources, getBacklinks)
    - packages/cli: Commander.js CLI entry point + command registration (thin wrapper over shared)
    - packages/vscode: VS Code extension with tree views, command palette, status bar
    Extension follows standard VS Code extension patterns: activate/deactivate entry point,
    TreeDataProvider for each view, registerCommand for palette, StatusBarItem for stats.

  affected_areas:
    - "Root package.json — add workspaces configuration"
    - "src/lib/ → packages/shared/src/ — move core libraries"
    - "src/commands/ → packages/cli/src/commands/ — move CLI commands"
    - "src/cli.ts → packages/cli/src/cli.ts — move entry point"
    - "tests/ — reorganize to match monorepo structure"
    - ".github/workflows/ci.yml — update for monorepo build"
    - "packages/vscode/ — entirely new VS Code extension"

  component_details:
    - component: "@llmwiki/shared"
      responsibility: "Core wiki CRUD operations, index management, log management, plus new listSources and getBacklinks APIs"
      interfaces:
        - "readPage(filePath) → WikiPage"
        - "listPages(wikiDir) → string[]"
        - "getPageLinks(content) → string[]"
        - "readIndex(filePath) → IndexEntry[]"
        - "findEntries(entries, options) → IndexEntry[]"
        - "listSources(rawDir) → SourceFile[]"
        - "getBacklinks(wikiDir, targetPage) → BacklinkResult[]"

    - component: "@llmwiki/cli"
      responsibility: "Commander.js CLI registration, formatting output, process exit codes — thin wrapper calling shared functions"
      interfaces:
        - "createProgram() → Command"
        - "registerInitCommand(wiki) → void"
        - "registerIngestCommand(wiki) → void"
        - "registerQueryCommand(wiki) → void"
        - "registerLintCommand(wiki) → void"
        - "registerStatusCommand(wiki) → void"

    - component: "@llmwiki/vscode"
      responsibility: "VS Code extension providing interactive wiki browsing, command palette operations, and status bar"
      interfaces:
        - "activate(context) → void"
        - "deactivate() → void"
        - "WikiPagesTreeDataProvider implements TreeDataProvider"
        - "RawSourcesTreeDataProvider implements TreeDataProvider"
        - "BacklinksTreeDataProvider implements TreeDataProvider"
        - "LintFindingsTreeDataProvider implements TreeDataProvider"

  dependencies:
    - component: "@llmwiki/cli"
      relationship: "imports @llmwiki/shared for all wiki operations"
    - component: "@llmwiki/vscode"
      relationship: "imports @llmwiki/shared for wiki operations, uses vscode API for UI"

  integration_points:
    - "packages/shared/src/index.ts — barrel export for all shared APIs"
    - "packages/vscode/package.json — contributes.commands, contributes.views, activationEvents"
    - "packages/vscode/src/extension.ts — activate() registers all providers and commands"
    - ".github/workflows/ci.yml — builds and tests all three packages"

