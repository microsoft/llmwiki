  - id: c2-03
    title: "Fix audit findings from cycle-1 review"
    description: |
      Address three audit findings from the post-cycle-1 review:

      S-7 (security): ingest.ts accepts arbitrary file paths — add path validation to ensure the resolved
      source path does not escape the project root via path traversal (e.g., ../../etc/passwd). Use
      resolve() and check that the resolved path starts with the expected base directory.

      Q-1 (quality): 12 bare catch {} blocks across lib/ and commands/ — narrow each catch to specific
      error types or at minimum add a comment explaining why the error is swallowed. Where possible,
      catch only the expected error (e.g., ENOENT for missing files).

      Q-2 (quality): readdir in status.ts missing recursive flag — the raw/ directory may contain
      subdirectories. Use { recursive: true } and filter to files only, matching listPages() behavior.

      Write tests for the path validation security fix.
