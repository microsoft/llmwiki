plan_id: cycle-5
objective: "Determine the highest-impact focus areas for cycle-5 of the llmwiki project"
focus_area: cycle5_planning
created_at: "2025-07-25"
created_by: gem-researcher
status: completed

tldr: |
  - All 4 strategy pillars (CLI, Actions, VS Code, Schema) are implemented; cycle-5 is about depth, not breadth.
  - Highest-impact opportunity: MCP Resources + Prompts — the MCP server only exposes tools; adding resources (wiki pages as browsable resources) and prompt templates (ingest workflow, lint review) would make the wiki dramatically more useful to LLM agents without requiring tool calls for basic reads.
  - Second highest: GitHub Actions hardening — scheduled lint, PR-triggered wiki validation, and lint-gate merge protection would create a self-healing wiki that catches problems automatically.
  - Third highest: Delete/rename/move operations — the wiki has no way to delete pages, rename them, or reorganize content. This is the #1 missing CRUD operation, both in CLI and MCP.
  - E2E tests are flaky on Windows (4 failures from timeouts + EBUSY). Coverage thresholds are set at only 60%.
  - VS Code extension lacks MCP awareness — it can't invoke or benefit from the MCP write tools. Adding a "smart ingest" command that leverages ingest-with-context would close this gap.

research_metadata:
  methodology: "Multi-pass hybrid retrieval: semantic search + grep search across all packages, file reads of all source modules, external web search for competitor landscape and MCP best practices, GitHub Actions patterns research. 3 passes: (1) structure + architecture, (2) code-level gap analysis, (3) external research + synthesis."
  scope: "Full codebase — packages/shared/src (18 modules), packages/cli/src (8 modules), packages/vscode/src (6 modules), tests (31 test files), .github/workflows (2 files), docs/plan, ARCHITECTURE.md, STRATEGY.md, idea.md, cycle-2-review.md"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

