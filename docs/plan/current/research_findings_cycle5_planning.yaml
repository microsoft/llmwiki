# ===========================================================================
# TECHNICAL APPROACHES DISCOVERED
# ===========================================================================
technical_approaches:
  - approach: "MCP Resources for wiki pages"
    description: |
      Register wiki pages as MCP Resources using resource:// URIs. Each page becomes
      resource://wiki/{relative-path}. The index becomes resource://wiki/index.
      Agents can list and read resources without tool calls, reducing latency and token usage.
    source: "MCP specification (spec.modelcontextprotocol.io) — Resources section"
    applicability: "Direct — @modelcontextprotocol/sdk already supports ListResourcesRequestSchema and ReadResourceRequestSchema"

  - approach: "MCP Prompt templates"
    description: |
      Define reusable prompts like "ingest-and-integrate" (ingest source, find related pages,
      suggest entity/concept pages to create) and "lint-and-fix" (run lint, auto-fix deterministic
      issues, report remaining). Agents select prompts instead of composing tool chains from scratch.
    source: "MCP specification — Prompts section"
    applicability: "Direct — server.setRequestHandler(ListPromptsRequestSchema, ...) + GetPromptRequestSchema"

  - approach: "Rename with backlink rewriting"
    description: |
      To rename a page: (1) read page, (2) write to new path with updated frontmatter, (3) scan all
      pages for links to old path using getPageLinksDetailed, (4) rewrite links in each referencing
      page, (5) update index entry path, (6) delete old file, (7) log the operation.
      Use a transaction-like pattern: collect all changes first, then apply atomically.
    source: "Logseq and Obsidian both implement rename-with-backlink-rewrite"
    applicability: "Direct — all building blocks exist (getPageLinksDetailed, readPage, writePage, readIndex, writeIndex)"

  - approach: "GitHub Actions lint with issue creation"
    description: |
      Scheduled workflow runs `plaid wiki lint --json`, parses output, and if errorCount > 0,
      creates or updates a GitHub issue with findings. Uses actions/github-script for API calls.
      Can also post as a PR check status on wiki/** changes.
    source: "GitHub Actions documentation — schedule event + github-script action"
    applicability: "Direct — lint already returns structured JSON with errorCount"

# ===========================================================================
# OPEN QUESTIONS
# ===========================================================================
open_questions:
  - question: "Should MCP Resources be read-only or support resource subscriptions (real-time updates)?"
    context: "MCP spec supports resource subscriptions for live updates. For a git-backed wiki, subscriptions would fire on file system changes. This adds complexity but enables agents to react to wiki updates."
    type: nice_to_know
    affects: ["MCP Resources implementation"]

  - question: "Should delete operations be soft-delete (move to trash/) or hard-delete (rm)?"
    context: "The wiki is git-backed, so hard-delete is recoverable via git. But a trash/ directory provides easier undo for non-git-savvy users."
    type: research
    affects: ["delete page implementation"]

  - question: "Should lint --fix be exposed as an MCP tool?"
    context: "If agents can fix lint issues, the wiki becomes self-healing via MCP. But destructive auto-fixes (orphan removal) need careful gating."
    type: research
    affects: ["lint auto-fix implementation", "MCP tool set"]

  - question: "How should MCP Resources handle large wikis (1000+ pages)?"
    context: "The MCP spec's list_resources returns all resources. For a wiki with many pages, this could be large. Pagination or hierarchical resource URIs (resource://wiki/entities/, resource://wiki/concepts/) may be needed."
    type: research
    affects: ["MCP Resources implementation"]

