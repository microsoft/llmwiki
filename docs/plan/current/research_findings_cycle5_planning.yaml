patterns_found:
  - category: architecture
    pattern: "Shared library as single source of truth"
    description: "All wiki operations live in @llmwiki/shared. CLI, VS Code, and MCP all consume the same library. No logic duplication across consumers."
    examples:
      - file: packages/vscode/src/commands.ts
        location: "commands.ts:1-16"
        snippet: "import { readIndex, directoryExists, lintWiki, appendEntry, ingestSource, bulkIngest, queryWiki, getWikiStatus } from '@llmwiki/shared';"
      - file: packages/shared/src/mcp/write-tools.ts
        location: "write-tools.ts:1-12"
        snippet: "import { readPage, writePage, createEntityPage, createConceptPage, addCrosslinks } from '../wiki.js';"
    prevalence: common

  - category: architecture
    pattern: "MCP tools-only server (no resources or prompts)"
    description: "The MCP server declares only { tools: {} } capabilities. It does not expose wiki pages as MCP Resources (browsable by agents) or define MCP Prompt templates (reusable workflows). This limits agent discoverability."
    examples:
      - file: packages/shared/src/mcp/server.ts
        location: "server.ts:26"
        snippet: "{ capabilities: { tools: {} } }"
    prevalence: common

  - category: architecture
    pattern: "CRUD gap — no delete, rename, or move operations"
    description: "The shared library and MCP server support create, read, update (partial) operations but have no deletePage, renamePage, or movePage. This affects both CLI and VS Code. Wiki maintenance requires manual file deletion."
    examples:
      - file: packages/shared/src/wiki.ts
        location: "wiki.ts (full file)"
        snippet: "// Exports: readPage, writePage, listPages, directoryExists, getPageLinks, createEntityPage, createConceptPage, addCrosslinks — no delete/rename"
    prevalence: common

  - category: error_handling
    pattern: "Consistent ENOENT/EACCES guards"
    description: "After cycle-3/4 cleanup, most catch blocks properly check isNotFoundError(). Only 1 bare catch{} remains in wiki.ts:addCrosslinks (line 231)."
    examples:
      - file: packages/shared/src/wiki.ts
        location: "wiki.ts:231"
        snippet: "} catch { title = tp.replace(/\\.md$/, '').split('/').pop()!; }"
    prevalence: rare

  - category: security
    pattern: "Input validation and DoS prevention on MCP tools"
    description: "Write tools enforce body size (1MB), title length (500), tag count (50), crosslink targets (100), path length (500). All paths validated with assertWithinDir."
    examples:
      - file: packages/shared/src/mcp/write-tools.ts
        location: "write-tools.ts:226-230"
        snippet: "const MAX_BODY_LENGTH = 1_000_000; const MAX_TITLE_LENGTH = 500; const MAX_TAGS_COUNT = 50;"
    prevalence: common

  - category: testing
    pattern: "560+ tests across 31 files with 3-tier structure"
    description: "Tests organized as: shared unit tests (14 files), CLI command tests (6 files) + E2E (1 file) + unit (2 files), VS Code mock-based tests (6 files) + integration suite (1 file, excluded from CI)."
    examples:
      - file: tests/shared/mcp/write-tools.test.ts
        location: "write-tools.test.ts"
        snippet: "70 test cases for MCP write tool dispatch, validation, error handling"
    prevalence: common

  - category: testing
    pattern: "E2E tests flaky on Windows"
    description: "4 E2E tests fail on Windows: 3 from 5000ms timeouts (full workflow tests), 1 from EBUSY on temp dir cleanup. These are infrastructure issues, not logic bugs."
    examples:
      - file: tests/cli/e2e/cli.test.ts
        location: "cli.test.ts:621, 663, 728"
        snippet: "Error: Test timed out in 5000ms + EBUSY: resource busy or locked, rmdir"
    prevalence: occasional

  - category: structure
    pattern: "Consistent JSON output with api_version"
    description: "All command outputs include command name, api_version: '1', and structured data. This enables forward-compatible agent interop."
    examples:
      - file: packages/shared/src/constants.ts
        location: "constants.ts:5"
        snippet: "export const API_VERSION = '1';"
    prevalence: common

  - category: naming
    pattern: "Kebab-case files, PascalCase classes, camelCase functions"
    description: "Consistent naming across all packages. File names use kebab-case (write-tools.ts), classes use PascalCase (WikiPagesTreeDataProvider), functions use camelCase (readPage)."
    examples:
      - file: packages/shared/src/ingest-context.ts
        location: "ingest-context.ts"
        snippet: "export async function ingestWithContext(...)"
    prevalence: common

