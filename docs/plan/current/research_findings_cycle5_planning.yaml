# ===========================================================================
# CYCLE-5 FOCUS AREA ANALYSIS
# ===========================================================================
# Ranked by compound value (impact × reusability × alignment with strategy)

cycle5_focus_areas:

  - rank: 1
    area: "MCP Resources + Prompts"
    impact: very_high
    confidence: high
    description: |
      The MCP server currently only exposes tools. MCP Resources would let agents browse
      wiki pages, index entries, and source files as first-class data — no tool call needed
      for basic reads. MCP Prompts would provide reusable workflow templates (e.g., "ingest
      this source and update related pages", "perform a full lint review and fix issues").
      This transforms the wiki from a tool server into a knowledge server.
    evidence:
      - "server.ts:26 — only { tools: {} } capabilities declared"
      - "MCP spec supports resources://, prompts://, and tools:// — llmwiki uses only tools"
      - "Competitor tools (AnythingLLM, Dust) offer browsable knowledge APIs, not just function calls"
    risk: low
    risk_detail: "Additive change — existing tools unchanged. Resources are read-only by nature. MCP SDK already supports resources and prompts."
    strategy_alignment: "Directly serves 'agent interop' goal — makes wiki a shared knowledge layer, not just a function endpoint"

  - rank: 2
    area: "GitHub Actions Hardening"
    impact: high
    confidence: high
    description: |
      Three new workflows would create a self-healing wiki:
      1. lint.yml — scheduled weekly lint (cron) + manual dispatch. Runs `plaid wiki lint --json`
         and opens an issue or PR comment if errors found.
      2. PR-triggered wiki validation — on PRs that touch wiki/**, run lint and report as check.
      3. lint-gate — block merge if wiki lint has errors (uses exit code 1 from lint).
      This closes the automation loop: ingest is automated, but quality isn't.
    evidence:
      - "ingest.yml exists but no lint.yml or validation workflow"
      - "ci.yml runs TypeScript lint but zero wiki content validation"
      - "Strategy says 'Automated when you don't' — lint should be automated too"
    risk: low
    risk_detail: "Pure additions to .github/workflows/. No source code changes needed."
    strategy_alignment: "Directly serves 'automated when you don't want it' goal and 'zero bookkeeping burden'"

  - rank: 3
    area: "Delete / Rename / Move Operations"
    impact: high
    confidence: high
    description: |
      The wiki has no delete, rename, or move operations — in CLI, MCP, or VS Code.
      This is the #1 missing CRUD operation. A user cannot:
      - Delete an obsolete page (must manually rm + clean index + clean log)
      - Rename a page (must manually create new, copy content, update all backlinks, delete old)
      - Move a page between directories (e.g., sources/ → concepts/)
      
      Needed: deletePage() + renamePage() in shared lib, wiki_delete_page + wiki_rename_page MCP tools,
      `plaid wiki delete` + `plaid wiki rename` CLI commands, VS Code context menu actions.
    evidence:
      - "wiki.ts exports: readPage, writePage, listPages — no deletePage"
      - "write-tools.ts: 7 tools — all create/update, none delete/rename"
      - "commands.ts: 7 VS Code commands — none for delete/rename"
    risk: medium
    risk_detail: "Delete operations are destructive. Need confirmation prompts (CLI --yes, VS Code dialog), index cleanup, backlink warning. Rename needs backlink rewriting across all pages."
    strategy_alignment: "Serves 'wiki compounds over time' — stale content needs pruning to keep signal-to-noise high"

  - rank: 4
    area: "VS Code Extension Enhancement"
    impact: medium
    confidence: high
    description: |
      Six improvements that compound value:
      1. Smart Ingest command — use ingestWithContext() instead of plain ingestSource() to show
         related pages and suggested actions after ingest.
      2. Delete page from context menu — right-click a page in the tree view to delete it.
      3. Rename page command — renames file, updates frontmatter, rewrites backlinks.
      4. Drag-and-drop source upload — drag files from OS into Raw Sources tree view.
      5. Webview for rendered wiki pages — preview markdown with working cross-references.
      6. Quick pick for MCP tool invocation — expose MCP tools as VS Code commands for testing.
    evidence:
      - "commands.ts uses ingestSource() not ingestWithContext()"
      - "No delete/rename commands in VS Code"
      - "STRATEGY.md mentions 'drag-and-drop source upload' as desired feature"
      - "No webview rendering — extension only opens raw markdown files"
    risk: low_to_medium
    risk_detail: "Webview and drag-drop add complexity. Smart ingest and delete are straightforward."
    strategy_alignment: "Serves 'interactive when you want it' — reduces terminal dependency"

  - rank: 5
    area: "Test Reliability + Coverage"
    impact: medium
    confidence: high
    description: |
      Three quality improvements:
      1. Fix E2E test flakiness — increase timeout from 5000ms to 15000ms for full workflow tests;
         add retry logic for EBUSY errors on Windows temp dir cleanup.
      2. Raise coverage thresholds — from 60/60/50/60 to 80/80/70/80. Current test count (560+)
         likely already meets this; the threshold just needs updating.
      3. Wire VS Code integration tests to CI — either add a job using @vscode/test-electron
         or explicitly document as manual-only. This has been tech debt since cycle-2 (C-6).
    evidence:
      - "4 E2E tests fail on Windows (timeouts + EBUSY)"
      - "vitest.config.ts thresholds: lines 60, functions 60, branches 50, statements 60"
      - "cycle-2-review.md C-6: 'VS Code integration tests never wired to CI'"
    risk: low
    risk_detail: "Timeout increases and threshold bumps are low-risk. VS Code CI job may need platform-specific config."
    strategy_alignment: "Infrastructure quality — enables faster iteration in future cycles"

  - rank: 6
    area: "Lint Auto-Fix Mode"
    impact: medium
    confidence: medium
    description: |
      The lint command reports findings but cannot fix them. A `plaid wiki lint --fix` mode could:
      - Remove stale index entries (pointing to deleted files)
      - Add missing pages to the index
      - Add missing frontmatter fields with defaults
      - Remove orphan pages (with confirmation)
      This would make the scheduled lint Action self-healing, not just reporting.
    evidence:
      - "lint.ts returns findings but has no fix mode"
      - "Stale entries and index completeness are deterministic fixes"
      - "Frontmatter defaults are well-defined in AGENTS.md"
    risk: medium
    risk_detail: "Auto-deletion of orphan pages is destructive. Should require explicit --fix-orphans flag. Other fixes are safe."
    strategy_alignment: "Directly serves 'zero bookkeeping burden' — lint repairs itself"

  - rank: 7
    area: "Search Improvements"
    impact: medium
    confidence: medium
    description: |
      Current search is substring-based (countOccurrences). At personal scale this works,
      but three improvements would help:
      1. Fuzzy matching — handle typos (e.g., "machne lerning" → "machine learning")
      2. Tag-based filtering — `plaid wiki query --tag research "AI"` to narrow results
      3. Date-range filtering — `plaid wiki query --since 2025-01 "AI"` for temporal relevance
      The strategy explicitly says "don't build a vector database" but these are still
      keyword-based improvements, not RAG.
    evidence:
      - "search.ts: simple indexOf-based counting"
      - "query.ts: no tag or date filters"
      - "STRATEGY.md: 'at personal scale, index + keyword search is sufficient'"
    risk: low
    risk_detail: "Additive improvements to existing query function. No architectural changes."
    strategy_alignment: "Serves 'more compound value' — better search makes existing content more discoverable"

