plan_id: llmwiki
objective: Research how a customized hosted git repo can integrate with the LLM Wiki pattern
focus_area: hosted-git-integration
created_at: "2026-04-09"
created_by: gem-researcher
status: completed

tldr: |
  - The LLM Wiki pattern has three layers (raw sources, wiki, schema) that map naturally onto git repo primitives: branches, directories, webhooks, and API-driven content management.
  - **Decision: GitHub repo + GitHub Actions** is the chosen integration path — minimizes infrastructure dependency, no self-hosting burden, and GitHub Actions provides the automation layer for event-driven ingest pipelines. Scope is personal use only.
  - Three client surfaces are planned: (1) **GitHub Actions** for automated ingest on push to raw/, (2) a **VS Code extension** for interactive source upload, wiki browsing, and conversational interaction with the LLM Wiki, (3) a **CLI tool** exposing ingest/query/lint operations so external LLM agents can programmatically interact with the wiki.
  - Key integration surfaces: (1) GitHub Actions workflow on push → triggers LLM ingest, (2) GitHub Contents API → LLM writes wiki pages programmatically, (3) git history → provides the log/versioning layer for free, (4) VS Code extension → interactive UI for source management and wiki exploration, (5) CLI → agent-to-agent interface.
  - Open questions center on: VS Code extension architecture (webview vs tree view), CLI protocol design for agent interop, and GitHub Actions secrets management for LLM API keys.

research_metadata:
  methodology: "Hybrid retrieval: read_file for idea.md analysis, fetch_webpage for GitHub Contents API docs, Gitea docs, Forgejo docs, QMD README; relationship discovery via cross-referencing the three-layer architecture against git platform capabilities"
  scope: "Focused: GitHub as hosting platform (chosen to minimize infra); GitHub Actions for automation; VS Code extension for interactive use; CLI for agent interop; QMD as search layer; personal use only"
  confidence: high
  coverage: 80
  decision_blockers: 1
  research_blockers: 1

files_analyzed:
  - file: idea.md
    path: c:\code\llmwiki\idea.md
    purpose: Core idea document describing the LLM Wiki pattern
    key_elements:
      - element: Three-layer architecture
        type: pattern
        location: "idea.md:38-44"
        description: "Raw sources (immutable), Wiki (LLM-generated markdown), Schema (CLAUDE.md/AGENTS.md conventions)"
      - element: Operations
        type: pattern
        location: "idea.md:46-60"
        description: "Three operations: Ingest (source → wiki updates), Query (search wiki → synthesize answer), Lint (health-check wiki consistency)"
      - element: index.md and log.md
        type: pattern
        location: "idea.md:62-72"
        description: "index.md as content catalog, log.md as chronological append-only record"
      - element: QMD search tool
        type: variable
        location: "idea.md:74-78"
        description: "Optional CLI/MCP search engine for wiki pages at scale"
      - element: Git as versioning layer
        type: pattern
        location: "idea.md:88"
        description: "'The wiki is just a git repo of markdown files. You get version history, branching, and collaboration for free.'"
    language: markdown
    lines: 108

patterns_found:
  - category: architecture
    pattern: "Three-layer separation: raw, wiki, schema"
    description: "The idea strictly separates immutable source documents, LLM-generated wiki pages, and the schema/conventions document. This maps directly onto git repo structure."
    examples:
      - file: idea.md
        location: "idea.md:38-44"
        snippet: |
          Raw sources — immutable, LLM reads but never modifies.
          The wiki — LLM-generated markdown. LLM owns entirely.
          The schema — CLAUDE.md/AGENTS.md conventions document.
    prevalence: common

  - category: architecture
    pattern: "Event-driven ingest pipeline"
    description: "When a new source is added, the LLM reads it, creates/updates wiki pages, updates the index, and logs the action. This is inherently an event-driven workflow that maps to git push → webhook → LLM processing."
    examples:
      - file: idea.md
        location: "idea.md:46-52"
        snippet: |
          You drop a new source into the raw collection and tell the LLM to process it.
          The LLM reads the source, writes a summary, updates the index, updates entity/concept pages, appends to log.
    prevalence: common

  - category: structure
    pattern: "Repo-as-wiki vs built-in wiki"
    description: "The idea treats the wiki as a plain directory of markdown files within a git repo, not a separate wiki feature. This is significant for integration: Gitea/Forgejo have a built-in wiki (separate git repo per project wiki), but the idea's pattern works better as a standard repo with markdown files."
    examples:
      - file: idea.md
        location: "idea.md:88"
        snippet: "The wiki is just a git repo of markdown files."
    prevalence: common

  - category: naming
    pattern: "Obsidian-compatible markdown with wikilinks"
    description: "The idea references Obsidian as the primary reading interface, implying [[wikilink]] syntax, YAML frontmatter, and Obsidian-compatible relative links. Gitea renders standard markdown and supports frontmatter; Obsidian wikilinks would need a rendering plugin or be treated as plaintext in the git forge UI."
    examples:
      - file: idea.md
        location: "idea.md:80-88"
        snippet: "Obsidian's graph view is the best way to see the shape of your wiki."
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "GitHub (hosted git)"
      responsibility: "Hosts the wiki repo as a private GitHub repo. Provides Contents API for file CRUD, Actions for automation, markdown rendering for web browsing, and git history."
      location: "github.com (hosted)"
      relationship_to_domain: "Core infrastructure — zero self-hosting, minimal infra dependency"

    - component: "GitHub Actions workflow"
      responsibility: "Triggers on push to raw/ directory. Runs LLM ingest pipeline: reads new source, calls LLM API, commits wiki page updates back to repo."
      location: ".github/workflows/ingest.yml"
      relationship_to_domain: "Automation layer — replaces custom webhook middleware"

    - component: "VS Code extension"
      responsibility: "Interactive UI for uploading sources (drag-and-drop or file picker → raw/), browsing wiki pages (tree view or webview), querying the wiki via chat panel, viewing ingest status, and triggering lint operations."
      location: "Custom VS Code extension to build"
      relationship_to_domain: "Primary interactive interface for the user — replaces manual git operations and raw CLI usage"

    - component: "CLI tool (llmwiki)"
      responsibility: "Exposes ingest, query, lint, and status operations as CLI commands. Designed for both human use and agent-to-agent interop — external LLM agents can call `llmwiki ingest <source>`, `llmwiki query <question>`, `llmwiki lint` programmatically."
      location: "Custom CLI to build (npm/pip package or standalone binary)"
      relationship_to_domain: "Programmatic interface — enables other agents and scripts to interact with the wiki without UI"

    - component: "LLM agent (Claude Code, Codex, etc.)"
      responsibility: "Reads sources, generates/updates wiki pages, maintains index and log"
      location: "External — user's LLM tool"
      relationship_to_domain: "Consumer of git API, producer of wiki content"

    - component: "QMD search engine"
      responsibility: "Provides hybrid BM25/vector search over wiki markdown files"
      location: "Sidecar service or CLI tool"
      relationship_to_domain: "Optional enhancement — indexes the wiki repo collection for better query performance at scale"

    - component: "Obsidian (local client)"
      responsibility: "Local reading/browsing interface with graph view, Dataview queries, Marp slides"
      location: "User's local machine"
      relationship_to_domain: "Consumes the git repo via clone/pull; coexists with web UI"

  interfaces_used_by_domain:
    - interface: "GitHub Contents API"
      location: "https://api.github.com/repos/{owner}/{repo}/contents/{path}"
      usage_pattern: "GET to read files (returns base64 + sha). PUT to create/update (base64 content + commit message + sha). DELETE to remove. Used by GitHub Actions workflow and CLI tool to read/write wiki pages programmatically."

    - interface: "GitHub Actions workflow triggers"
      location: ".github/workflows/ingest.yml"
      usage_pattern: "on.push.paths filter for raw/** triggers the ingest workflow. Also supports workflow_dispatch for manual triggers from VS Code extension or CLI."

    - interface: "VS Code Extension API"
      location: "VS Code extension host"
      usage_pattern: "TreeDataProvider for wiki browsing. WebviewPanel for rich wiki rendering. FileSystemProvider or workspace file watchers for source upload. OutputChannel for ingest status. Commands registered for ingest/query/lint."

    - interface: "CLI commands (llmwiki)"
      location: "Terminal / stdin-stdout"
      usage_pattern: "llmwiki ingest <path> — adds source and triggers processing. llmwiki query <question> — searches wiki, returns answer. llmwiki lint — runs health check. llmwiki status — shows recent operations. Returns structured JSON for agent consumption, human-readable text for interactive use."

    - interface: "Git CLI (clone/pull/push)"
      location: "Local filesystem"
      usage_pattern: "Obsidian syncs via git pull. LLM agents like Claude Code operate on local clones. GitHub is the remote."

  data_flow_involving_domain: |
    Flow A — Automated ingest (GitHub Actions):
    1. User adds source document → pushes to raw/ in GitHub repo (via VS Code extension, CLI, or git push)
    2. GitHub Actions workflow triggers on push to raw/**
    3. Workflow reads new source, calls LLM API to generate wiki updates
    4. Workflow commits updated wiki pages back to repo via Contents API or git push
    5. log.md and index.md updated as part of the commit

    Flow B — Interactive (VS Code extension):
    1. User drags a source file into VS Code extension panel → extension commits to raw/ via git
    2. User can trigger ingest manually via command palette or wait for Actions
    3. Extension polls or watches for wiki/ changes → refreshes tree view
    4. User browses wiki pages in VS Code webview, asks questions via chat panel

    Flow C — Agent interop (CLI):
    1. External agent calls `llmwiki ingest <source>` → CLI commits source to raw/, optionally triggers workflow_dispatch
    2. External agent calls `llmwiki query <question>` → CLI reads wiki via local clone or API, calls LLM for synthesis, returns structured JSON
    3. External agent calls `llmwiki lint` → CLI runs health check, returns issues as structured output

    Browsing:
    - Wiki pages browsable on GitHub web UI (rendered markdown), in Obsidian (local clone), and in VS Code extension (webview)
    - QMD indexes wiki/ directory for search queries at scale

  key_relationships_to_domain:
    - from: "Git push (raw/ directory)"
      to: "GitHub Actions → LLM ingest"
      relationship: "triggers"
    - from: "GitHub Actions workflow"
      to: "GitHub Contents API"
      relationship: "calls (CRUD wiki pages)"
    - from: "VS Code extension"
      to: "Git repo (local clone)"
      relationship: "reads wiki, commits sources"
    - from: "VS Code extension"
      to: "CLI tool"
      relationship: "invokes for ingest/query/lint operations"
    - from: "CLI tool"
      to: "GitHub API + local clone"
      relationship: "reads/writes wiki, triggers workflows"
    - from: "External LLM agents"
      to: "CLI tool"
      relationship: "calls as subprocess for agent-to-agent interop"
    - from: "Obsidian"
      to: "Git repo"
      relationship: "clones/pulls"
    - from: "QMD"
      to: "Wiki directory"
      relationship: "indexes"
    - from: "Git history"
      to: "log.md"
      relationship: "partially replaces (git log IS the changelog)"

