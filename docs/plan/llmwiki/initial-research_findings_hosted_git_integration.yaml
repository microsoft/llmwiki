      purpose_for_domain: "Search at scale (optional, for wikis >100 pages)"

domain_security_considerations:
  sensitive_areas:
    - area: "LLM API key management"
      location: "GitHub Actions Secrets; CLI config"
      concern: "LLM API keys (Claude, OpenAI) stored as GitHub Actions secrets for the ingest workflow. CLI tool needs local config (~/.llmwiki/config) with API keys stored securely, never committed to repo."
    - area: "GitHub token scope"
      location: "GitHub PAT or fine-grained token"
      concern: "VS Code extension and CLI need a GitHub token with contents:write scope for the wiki repo. Use fine-grained tokens scoped to the single repo."
    - area: "LLM prompt injection via source documents"
      location: "raw/ directory → LLM ingest"
      concern: "Malicious source documents could contain prompt injection attempts. The LLM ingest pipeline should sanitize or sandbox source processing."
    - area: "Private knowledge exposure"
      location: "GitHub repo visibility"
      concern: "Personal wikis contain sensitive knowledge. Repo MUST be private. For personal use the GitHub private repo is acceptable."
  authentication_patterns_in_domain: "GitHub PAT (fine-grained, repo-scoped) for API access from CLI and VS Code extension. GitHub Actions uses GITHUB_TOKEN automatically."
  authorization_patterns_in_domain: "Fine-grained token scopes: contents:read for queries, contents:write for wiki updates. Actions workflow uses built-in GITHUB_TOKEN with repo scope."
  data_validation_in_domain: "API responses checked for 409 Conflict before writes. File sha verified on updates to prevent overwriting concurrent edits. CLI validates input paths exist before committing."

integration_approaches:
  chosen_approach_github_actions:
    name: "GitHub Repo + GitHub Actions Pipeline (SELECTED)"
    description: |
      Use a private GitHub repo. GitHub Actions workflow triggers on push to raw/ directory.
      The action invokes the LLM API, generates wiki updates, and commits them back.
      Minimizes infrastructure dependency — no self-hosting, no custom middleware.
    pros:
      - Zero self-hosting — minimal infra dependency
      - GitHub Actions well-documented, large ecosystem
      - GitHub Contents API well-supported
      - Familiar to most developers
      - Built-in secrets management for LLM API keys
      - Free tier sufficient for personal use (2000 Actions minutes/month)
      - workflow_dispatch allows manual triggers from CLI and VS Code extension
    cons:
      - LLM API keys stored as GitHub Secrets (acceptable for personal use)
      - GitHub Actions minutes have cost at scale (not a concern for personal use)
      - Data stored on GitHub servers (acceptable for personal use)
      - Multi-file atomic commits require git clone + push in the workflow (not API per-file)

  vscode_extension:
    name: "VS Code Extension for Interactive Use"
    description: |
      A VS Code extension that provides an interactive UI for the LLM Wiki:
      - Source upload: drag-and-drop or file picker → commits to raw/ via git
      - Wiki browser: TreeDataProvider showing wiki/ structure, WebviewPanel for rendered markdown
      - Query panel: chat-like interface for asking questions against the wiki
      - Status view: shows recent ingests, pending Actions runs, lint results
      - Command palette: commands for ingest, query, lint, open in Obsidian
      The extension wraps the CLI tool for operations and adds interactive UI on top.
    implementation_notes:
      - Built with TypeScript, standard VS Code Extension API
      - Extension depends on the CLI tool being installed (or bundles it)
      - Webview uses standard HTML/CSS for wiki page rendering
      - Tree view reads wiki/ directory structure from local clone
      - Git operations use VS Code's built-in git extension API or simple-git
    pros:
      - Integrated into the developer's primary editor
      - No context switching — source upload, wiki browsing, and queries all in VS Code
      - Can leverage VS Code's markdown preview for wiki pages
      - Can register as an MCP tool provider for LLM agents running in VS Code
    cons:
      - VS Code extension development has a learning curve
      - Webview rendering is sandboxed (limited interactivity)
      - Obsidian-style features (graph view, Dataview) not easily replicated

  cli_tool:
    name: "CLI Tool for Agent Interop (llmwiki)"
    description: |
      A CLI tool that exposes the LLM Wiki operations as commands:
      - `llmwiki init` — initialize a new wiki repo with standard structure
      - `llmwiki ingest <path>` — add source to raw/, trigger ingest (local or via workflow_dispatch)
      - `llmwiki query <question>` — search wiki, call LLM, return synthesized answer
      - `llmwiki lint` — run wiki health check, report issues
      - `llmwiki status` — show recent operations, pending Actions runs
      - `llmwiki search <terms>` — search wiki pages (wraps QMD if available, falls back to grep)
      Designed for both human use (colored text output) and agent consumption (--json flag).
    implementation_notes:
      - Built with TypeScript (Node.js), published as npm package
      - Uses octokit for GitHub API, simple-git for local git operations
      - --json flag outputs structured JSON for agent-to-agent interop
      - Config file at ~/.llmwiki/config.yaml (repo URL, LLM provider, API keys)
      - Can be invoked by external agents as a subprocess
      - MCP server mode: `llmwiki mcp` starts an MCP server exposing tools
    pros:
      - Universal interface — works from any terminal, any agent
      - Structured JSON output enables agent-to-agent communication
      - MCP server mode enables native LLM tool integration
      - Scriptable, composable with unix tools
      - No GUI dependency
    cons:
      - Requires Node.js runtime
      - Agent interop protocol design needs careful thought (error codes, output schema)

  rejected_self_hosted:
    name: "Self-Hosted Gitea/Forgejo (REJECTED)"
    reason: "Too much infrastructure dependency for personal use. Requires running and maintaining a server, managing updates, backups, TLS. GitHub provides all needed capabilities with zero ops burden."

  approach_4_hybrid_local_plus_hosted:
    name: "Hybrid: Local LLM Agent + GitHub for Sync/Automation"
    description: |
      The LLM agent operates on a local clone. GitHub serves as the remote for sync,
      web browsing, and Actions automation. Obsidian reads the local clone. The CLI tool
      and VS Code extension operate on the local clone and push to GitHub.
      This is the primary workflow — the other approaches (Actions, extension, CLI) layer on top.
    status: "Complementary to the chosen approach — local + hosted work together"

git_history_as_log_replacement:
  description: |
    The idea.md proposes log.md as an append-only chronological record. With a hosted git repo,
    git history itself partially replaces this:
    - `git log --oneline --all` gives the chronological record
    - Commit messages can follow a convention: "[ingest] Article Title", "[query] Question", "[lint] Health check"
    - Gitea/Forgejo web UI shows commit history per file (blame view)
    - However, log.md is still useful because: (a) it's readable without git tooling,
      (b) it can contain richer metadata than commit messages, (c) the LLM can read it
      directly as context for what's been done recently

open_questions:
  - question: "VS Code extension architecture: webview-heavy or tree-view-heavy?"
    context: "A webview-heavy extension provides richer rendering (full HTML/CSS wiki pages, graph view) but is more complex and sandboxed. A tree-view-heavy extension is simpler, uses VS Code's built-in markdown preview, but less custom. The choice affects development effort and user experience."
    type: decision_blocker
    affects: ["vscode-extension"]

  - question: "CLI output schema for agent interop: what structure should --json return?"
    context: "External LLM agents consuming CLI output need a stable, well-documented JSON schema. Need to define: status codes, error format, query result format, ingest confirmation format. This is the agent-to-agent contract."
    type: research
    affects: ["cli-tool", "agent-interop"]

  - question: "Should the wiki use Obsidian wikilinks ([[Page]]) or standard markdown links ([Page](page.md))?"
    context: "Obsidian wikilinks are convenient locally but don't render on GitHub web UI. Standard markdown links work everywhere but are more verbose. This affects whether GitHub is useful as a wiki browser or just a sync/backup target."
    type: decision_blocker
    affects: ["schema-design", "wiki-conventions"]

  - question: "How should the CLI and VS Code extension trigger ingest — local LLM call or workflow_dispatch?"
    context: "Two options: (a) CLI/extension calls LLM API directly and commits results locally, (b) CLI/extension pushes source to raw/ and triggers GitHub Actions workflow_dispatch to run ingest in CI. Option (a) is faster and works offline. Option (b) is consistent with the Actions pipeline but requires internet."
    type: research
    affects: ["cli-tool", "vscode-extension", "automation-pipeline"]

  - question: "How to handle Obsidian vault sync + git remote without conflicts?"
    context: "If Obsidian is open and watching the local clone while the LLM agent is also modifying files, filesystem conflicts can occur. Obsidian-git plugin handles this but needs careful configuration."
    type: nice_to_know
    affects: ["local-workflow"]

gaps:
  - area: "VS Code extension API patterns for wiki-like tools"
    description: "Need to research existing VS Code extensions that provide similar wiki/knowledge-base browsing experiences (e.g., Foam, Dendron) to identify reusable patterns for TreeDataProvider, webview rendering, and link navigation."
    impact: research_blocker
    affects: ["vscode-extension"]

  - area: "CLI output schema standards for agent interop"
    description: "Need to research existing conventions for CLI-to-agent communication (e.g., MCP tool schemas, JSON-RPC, structured CLI output patterns) to design a stable interop contract."
    impact: research_blocker
    affects: ["cli-tool", "agent-interop"]

  - area: "GitHub Actions workflow for LLM-driven content generation"
    description: "Need to find examples of GitHub Actions workflows that call LLM APIs and commit results back to the repo. Patterns for handling API rate limits, token costs, and failure modes in CI."
    impact: research_blocker
    affects: ["automation-pipeline"]

  - area: "QMD integration with GitHub-hosted repos"
    description: "QMD supports `qmd update --pull` for remote repos, but detailed integration with GitHub-hosted private repos (auth, SSH keys, scheduled re-indexing) was not deeply explored."
    impact: nice_to_know
    affects: ["search-integration"]
