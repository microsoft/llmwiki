related_conventions:
  naming_patterns_in_domain: |
    - Raw sources stored in raw/ directory (immutable)
    - Wiki pages in wiki/ directory (LLM-managed)
    - Schema in root as CLAUDE.md, AGENTS.md, or similar
    - index.md at wiki root as content catalog
    - log.md at wiki root as chronological event log
    - Frontmatter YAML for metadata (tags, dates, source counts)
  structure_of_domain: |
    repo-root/
    ├── raw/              # Immutable source documents
    │   ├── articles/
    │   ├── papers/
    │   └── assets/       # Downloaded images
    ├── wiki/             # LLM-generated pages
    │   ├── index.md      # Content catalog
    │   ├── log.md        # Chronological log
    │   ├── entities/     # Entity pages
    │   ├── concepts/     # Concept pages
    │   ├── sources/      # Source summaries
    │   └── analyses/     # Filed query results
    ├── AGENTS.md         # Schema/conventions for LLM
    ├── .github/
    │   └── workflows/
    │       └── ingest.yml  # GitHub Actions ingest pipeline
    ├── cli/                # CLI tool source (llmwiki command)
    └── vscode-ext/         # VS Code extension source
  error_handling_in_domain: "GitHub API operations should handle 409 Conflict (concurrent edits), retry with fresh sha. GitHub Actions failures visible in Actions tab. CLI returns non-zero exit codes with structured error JSON for agent consumers."
  testing_in_domain: "VS Code extension and CLI tool require standard TypeScript testing (vitest/jest). Wiki content itself is not code-tested but validated by lint operation."
  documentation_in_domain: "The schema document (AGENTS.md) IS the documentation — it tells the LLM how to operate. CLI --help documents commands for agent consumers."

