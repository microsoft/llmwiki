tasks:
  - id: c3-01
    title: "Extract duplicated logic into @llmwiki/shared"
    description: |
      Move business logic from CLI commands and VS Code commands.ts into @llmwiki/shared:

      1. Create packages/shared/src/utils.ts:
         - slugify(filename: string): string — from CLI ingest.ts:22-28
         - excerpt(body: string, maxLen?: number): string — from CLI ingest.ts:98-100

      2. Create packages/shared/src/search.ts:
         - countOccurrences(text: string, term: string): number — from CLI query.ts:24-35
         - scoreEntry(entry, terms, pageBody): number — extract scoring logic from query.ts:60-120

      3. Move ingestSource() from packages/cli/src/commands/ingest.ts to packages/shared/src/ingest.ts.
         CLI ingest command becomes a thin wrapper that calls shared ingestSource() and formats output.

      4. Move queryWiki() from packages/cli/src/commands/query.ts to packages/shared/src/query.ts.
         CLI query command becomes a thin wrapper.

      5. Move getWikiStatus() from packages/cli/src/commands/status.ts to packages/shared/src/status.ts.
         CLI status command becomes a thin wrapper.

      6. Update packages/vscode/src/commands.ts to import ingestSource, queryWiki, getWikiStatus,
         slugify, excerpt, countOccurrences from @llmwiki/shared instead of reimplementing.
         Remove ~160 lines of duplicated code.

      7. Update packages/vscode/src/statusBar.ts to import getWikiStatus from @llmwiki/shared
         instead of computing status inline.

      8. Re-export all new modules from packages/shared/src/index.ts barrel.
      9. All 307 existing tests must pass after refactor.
