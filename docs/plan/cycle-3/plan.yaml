  - id: c3-02
    title: "Add duplicate detection to ingest"
    description: |
      Before creating a summary page during ingest, check if wiki/sources/{slug}-summary.md already exists.

      Behavior:
      - If summary page exists and --force is NOT set: return IngestResult with status='skipped',
        message explaining the source was already ingested.
      - If summary page exists and --force IS set: overwrite the existing page, update index entry
        (remove old, add new), log the re-ingest.
      - If summary page does not exist: proceed as before.

      Also check for duplicate index entries and clean them up during ingest.

      Add --force flag to CLI ingest command and VS Code ingest handler.
      Update --json output to include 'skipped' status.
      Write tests for duplicate detection scenarios.
    wave: 2
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies:
