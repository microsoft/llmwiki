  - id: c3-05
    title: "Add vitest coverage reporting"
    description: |
      Configure vitest coverage to make testing gaps visible:

      1. Install @vitest/coverage-v8 as devDependency at root
      2. Configure in vitest.config.ts:
         - provider: 'v8'
         - reporter: ['text', 'lcov', 'json-summary']
         - include: ['packages/*/src/**/*.ts']
         - exclude: ['**/*.test.ts', '**/node_modules/**', '**/dist/**', '**/out/**']
      3. Add coverage script to root package.json: "coverage": "vitest run --coverage"
      4. Add coverage/ to .gitignore
      5. Set initial thresholds (lines: 60, functions: 60, branches: 50, statements: 60)
         to codify current baseline and prevent regression
      6. Update CI workflow to run coverage and report summary
