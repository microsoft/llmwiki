  - id: c3-07
    title: "Add bulk ingest support"
    description: |
      Add bulk ingest capability to process multiple source files at once:

      1. In @llmwiki/shared, add bulkIngest(rawDir: string, wikiDir: string, options: BulkIngestOptions):
         - Lists all files in raw/ via listSources()
         - For each file, checks if already ingested (slug-summary.md exists)
         - Ingests new files via ingestSource()
         - Returns BulkIngestResult with counts: ingested, skipped, failed, total

      2. CLI: 'plaid wiki ingest --all' or 'plaid wiki ingest <directory>':
         - --all: process entire raw/ directory
         - <directory>: process specified directory
         - --force: re-ingest even if already ingested
         - Show progress: "Ingesting 3/10..."
         - --json: return BulkIngestResult

      3. VS Code: update ingest command to offer "Ingest all new sources" option
         when user triggers llmwiki.ingest without selecting a file.

      4. Update GitHub Actions ingest.yml to use --all instead of shell loop.
