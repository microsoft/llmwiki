tldr: |
  Cycle-3 focuses on tool infrastructure hardening after the CLI (cycle-1) and VS Code extension (cycle-2)
  are complete. The #1 priority is extracting ~160 lines of duplicated logic from VS Code commands.ts into
  @llmwiki/shared, fixing the biggest tech debt and an ARCHITECTURE.md violation. After that, four parallel
  improvements: duplicate detection on ingest, frontmatter validation lint category, a new 'list' command
  for agent interop, and vitest coverage reporting. Wave 3 adds lint unit tests, bulk ingest, and minor
  schema/JSON fixes. Total: 10 tasks across 3 waves.

open_questions:
  - "LLM-powered ingest deferred to cycle-4 — current mechanical ingest is sufficient for infrastructure hardening"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Refactoring shared library breaks existing 307 tests"
      likelihood: low
      impact: high
      mitigation: "Move functions one at a time with re-exports from original locations. Run full test suite after each move."
    - scenario: "VS Code extension breaks after shared refactor due to import path changes"
      likelihood: medium
      impact: medium
      mitigation: "VS Code already imports from @llmwiki/shared. New functions will be added to the same barrel export."
    - scenario: "Bulk ingest creates race conditions when ingesting multiple files"
      likelihood: low
      impact: medium
      mitigation: "Sequential processing with duplicate detection. No concurrent file writes."
  assumptions:
    - "All 307 existing tests continue to pass throughout the cycle"
    - "Moving functions to shared is a refactor — no behavior changes"
    - "Personal wiki scale means no performance concerns with lint or list operations"

implementation_specification:
  code_structure: |
    Wave 1 moves ingestSource, queryWiki, getWikiStatus plus utility functions (slugify, countOccurrences,
    excerpt) from CLI and VS Code into @llmwiki/shared. CLI commands become thin wrappers. VS Code commands.ts
    drops ~160 lines of duplicated logic and imports from shared instead.
    Wave 2 adds four independent features: duplicate detection, frontmatter lint, list command, coverage.
    Wave 3 adds lint unit tests, bulk ingest, and minor fixes.

  affected_areas:
    - "packages/shared/src/ — new modules: utils.ts, search.ts; expanded: ingest.ts, query.ts, status.ts"
    - "packages/cli/src/commands/ — refactored to thin wrappers over shared"
    - "packages/vscode/src/commands.ts — drops duplicated logic, imports from shared"
    - "packages/vscode/src/statusBar.ts — imports getWikiStatus from shared"
    - "packages/shared/src/lint.ts — new frontmatter-validation category"
    - "packages/cli/src/commands/list.ts — new list command"
    - "vitest.config.ts — coverage configuration"
    - "tests/ — new lint unit tests, coverage thresholds"

  component_details:
    - component: "@llmwiki/shared (expanded)"
      responsibility: "All business logic: page I/O, index, log, sources, backlinks, lint, ingest, query, status, search utilities"
      interfaces:
        - "slugify(filename) → string"
        - "excerpt(body, maxLen) → string"
        - "countOccurrences(text, term) → number"
        - "ingestSource(sourcePath, wikiDir, dryRun) → IngestResult"
        - "queryWiki(queryStr, wikiDir) → QueryResult"
        - "getWikiStatus(wikiDir) → StatusResult"
        - "listPages(wikiDir) → PageInfo[]"
        - "listSources(rawDir) → SourceFile[]"
        - "lintWiki(wikiDir) → LintResult (with frontmatter-validation)"

    - component: "@llmwiki/cli (thinned)"
      responsibility: "Commander.js CLI registration, option parsing, output formatting — delegates all logic to shared"
      interfaces:
        - "registerListCommand(wiki) → void"
        - "All existing register*Command functions — simplified to call shared"

  dependencies:
    - component: "@llmwiki/cli"
      relationship: "imports all operations from @llmwiki/shared"
    - component: "llmwiki-vscode"
      relationship: "imports all operations from @llmwiki/shared (no more duplication)"

