plan_id: cycle-3
objective: "Identify high-value, low-effort improvements for the LLM Wiki after CLI (cycle-1) and VS Code extension (cycle-2) are complete"
focus_area: "cycle-3 planning — CLI maturity, extension polish, agent interop, schema evolution, ingest quality, testing, MCP"
created_at: "2025-07-17"
created_by: gem-researcher
status: completed

tldr: |
  - BIGGEST WIN: Extract duplicated logic (slugify, excerpt, countOccurrences, ingest workflow, query scoring, status computation) from VS Code commands.ts into @llmwiki/shared. This is the single highest-value refactor — it fixes a DRY violation across 6+ functions and unblocks all other improvements.
  - CLI is solid but lacks config file, verbose mode, bulk ingest, and a `list` command for agent interop. No duplicate detection on re-ingest.
  - Ingest pipeline is scaffolding only: 500-char excerpt, no LLM summarization, no cross-referencing, no tag generation, no duplicate detection. The idea.md vision of "touching 10-15 pages per ingest" is not yet realized.
  - Test coverage is strong (307 tests, all passing) but has no coverage reporting, no shared/lint unit tests, and VS Code integration tests are excluded from CI.
  - MCP server is premature — CLI --json is not yet battle-tested by real agent consumers. Shared library factoring is already good for future MCP wrapping.

research_metadata:
  methodology: "Hybrid retrieval: grep + glob + view for all source files. Full read of all shared library modules, all CLI commands, all VS Code extension files, all test directories, CI/CD workflows, STRATEGY.md, ARCHITECTURE.md, idea.md. Relationship discovery via import tracing. Duplicate detection via pattern matching."
  scope: "Full codebase — 3 packages (shared: 7 modules, cli: 6 files, vscode: 7 files), 20 test files, 2 GitHub Actions workflows, all documentation"
  confidence: high
  coverage: 95
  decision_blockers: 2
  research_blockers: 0

