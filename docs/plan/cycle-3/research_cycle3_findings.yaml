patterns_found:
  - category: architecture
    pattern: "Shared library pattern with DRY violation"
    description: |
      The project uses a well-designed shared library (@llmwiki/shared) consumed by both CLI and VS Code.
      However, VS Code commands.ts DUPLICATES significant logic that should be in shared:
      - slugify() — duplicated from CLI ingest.ts (commands.ts:128-129 vs ingest.ts:22-28)
      - excerpt extraction — duplicated (commands.ts:136-137 vs ingest.ts:98-100)
      - countOccurrences() — duplicated from CLI query.ts (commands.ts:186-196 vs query.ts:24-35)
      - Full ingest workflow — duplicated (commands.ts:91-167 vs ingest.ts:36-153)
      - Full query scoring — duplicated (commands.ts:170-252 vs query.ts:60-176)
      - Status computation — duplicated across commands.ts:281-323 AND statusBar.ts:53-104 AND CLI status.ts:23-91
      This contradicts ARCHITECTURE.md line 472: "The extension never duplicates core logic"
    examples:
      - file: packages/vscode/src/commands.ts
        location: "lines 128-129"
        snippet: "const slug = sourceFilename.replace(/\\.[^.]+$/, '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');"
      - file: packages/cli/src/commands/ingest.ts
        location: "lines 22-28"
        snippet: "function slugify(filename: string): string { ... }"
      - file: packages/vscode/src/commands.ts
        location: "lines 186-196"
        snippet: "const countOccurrences = (text: string, term: string): number => { ... }"
    prevalence: common

  - category: architecture
    pattern: "Clean separation of concerns in shared library"
    description: "Each module in shared has a single responsibility: wiki.ts (page I/O), index-ops.ts (index CRUD), log.ts (log append/read), sources.ts (raw file listing), backlinks.ts (link graph), lint.ts (health checks). All exports are re-exported through index.ts."
    examples:
      - file: packages/shared/src/index.ts
        location: "lines 1-7"
        snippet: "export * from './wiki.js'; export * from './index-ops.js'; ..."
    prevalence: common

  - category: error_handling
    pattern: "Graceful degradation on missing files"
    description: "All shared library functions use try/catch with empty-array fallbacks for ENOENT errors. readIndex, readLog, listPages, listSources all return empty arrays when files/directories don't exist."
    examples:
      - file: packages/shared/src/index-ops.ts
        location: "lines 78-83"
        snippet: "try { content = await readFile(filePath, 'utf-8'); } catch { return []; }"
    prevalence: common

  - category: error_handling
    pattern: "Structured error results in CLI"
    description: "CLI commands return result objects with status: 'error' and error message strings instead of throwing. The CLI layer converts these to exit codes. Uses process.exitCode (not process.exit()) for clean shutdown."
    examples:
      - file: packages/cli/src/commands/ingest.ts
        location: "lines 47-56"
        snippet: "return { command: 'ingest', status: 'error', error: 'Wiki is not initialized...' }"
    prevalence: common

  - category: testing
    pattern: "Three-tier test structure"
    description: "Tests are organized as: shared/ (library unit tests), cli/commands/ (command integration tests), cli/e2e/ (subprocess CLI tests), cli/unit/ (structural tests), vscode/ (VS Code mock tests). Each tier tests at a different abstraction level."
    examples:
      - file: tests/cli/e2e/cli.test.ts
        location: "lines 26-43"
        snippet: "function runCLI(args: string[], cwd: string, json = false): Promise<RunResult>"
    prevalence: common

  - category: naming
    pattern: "Consistent file and function naming"
    description: "Files use kebab-case (index-ops.ts, backlinks.ts). Functions use camelCase (readIndex, listPages, getBacklinks). Interfaces use PascalCase (IndexEntry, WikiPage, LintFinding). CLI commands match their filenames (init.ts → registerInitCommand)."
    prevalence: common

  - category: structure
    pattern: "Command registration pattern"
    description: "Each CLI command exports a registerXCommand(wiki: Command) function that uses Commander.js to register the subcommand with options and an action handler. The handler checks --json mode and formats output accordingly."
    examples:
      - file: packages/cli/src/commands/init.ts
        location: "lines 180-199"
        snippet: "export function registerInitCommand(wiki: Command): void { wiki.command('init')... }"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "@llmwiki/shared"
      responsibility: "Core wiki operations — all business logic for page I/O, index management, log, sources, backlinks, lint"
      location: "packages/shared/src/"
      relationship_to_domain: "Foundation that CLI and VS Code both depend on"
    - component: "@llmwiki/cli"
      responsibility: "Command-line interface with 5 subcommands and --json output"
      location: "packages/cli/src/"
      relationship_to_domain: "Primary agent-facing interface, wraps shared library"
    - component: "llmwiki-vscode"
      responsibility: "VS Code extension with 4 tree views, 7 commands, status bar"
      location: "packages/vscode/src/"
      relationship_to_domain: "Human-facing interactive layer, wraps shared library"
    - component: "GitHub Actions workflows"
      responsibility: "CI (build/lint/test) and auto-ingest on push to raw/"
      location: ".github/workflows/"
      relationship_to_domain: "Automation backbone for the wiki lifecycle"

  data_flow_involving_domain: |
    Human drops file into raw/ → GitHub Actions (or manual CLI) triggers ingest →
    CLI/shared reads source file → Creates summary page in wiki/sources/ →
    Updates wiki/index.md → Appends to wiki/log.md → Auto-commits.
    Query: user provides terms → CLI reads index.md → scores by title(3x)/summary(2x)/body(1x) → returns ranked results.
    Lint: scans all wiki pages + index → produces findings with severity levels.

  key_relationships_to_domain:
    - from: "@llmwiki/cli"
      to: "@llmwiki/shared"
      relationship: "imports all core operations"
    - from: "llmwiki-vscode"
      to: "@llmwiki/shared"
      relationship: "imports core operations BUT also duplicates some (ingest, query, status)"
    - from: "ingest.yml"
      to: "@llmwiki/cli"
      relationship: "calls CLI as subprocess for auto-ingest"
    - from: "ci.yml"
      to: "all packages"
      relationship: "builds, lints, and tests all three packages"

